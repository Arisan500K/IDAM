<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ARISAN BULANAN 500K</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<h1>ARISAN BULANAN 500K</h1>
<div class="ketua">Ketua: Idam</div>

<div class="card">

<div class="spinModes">

<button onclick="setMode('wheel')" class="mode wheel">🎡 Wheel</button>
<button onclick="setMode('dice')" class="mode dice">🎲 Dadu</button>
<button onclick="setMode('cup')" class="mode cup">🥤 Gelas</button>

</div>

<div id="spinVisual">🎡</div>

<button onclick="startSpin()" class="spinBtn">SPIN</button>

<div id="progress"></div>

</div>

<div class="card">

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<div class="card">

<h2>Statistik Voting</h2>
<div id="stats"></div>

</div>

<div class="card">

<h2>Riwayat Spin</h2>
<div id="history"></div>

</div>

<div class="card">

<h2>Pemenang Bulan Ini</h2>
<div id="winner"></div>

</div>

<div class="card">

<h2>Daftar Peserta</h2>
<div id="members"></div>

</div>

<div class="card">

<h2>Pembayaran</h2>
<div id="payments"></div>
<button onclick="adminMode()">Edit Pembayaran</button>

</div>

<button onclick="resetSystem()" class="resetBtn">Reset Sistem</button>

<script src="app.js"></script>

</body>
</html>
