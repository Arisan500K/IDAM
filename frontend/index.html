<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Login Arisan 500K</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e293b;
padding:30px;
border-radius:15px;
width:300px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#fbbf24;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Masuk Arisan</h2>

<label>Nama</label>

<input id="nama" placeholder="Masukkan nama">

<label>PIN</label>

<input id="pin" type="password">

<button onclick="login()">MASUK</button>

</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>
</html>
