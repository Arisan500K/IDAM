```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ARISAN BULANAN 500K</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#121212;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#ffcc00;
margin-bottom:5px;
}

.modeBox{
margin-bottom:10px;
}

.modeBtn{
padding:10px 15px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
font-weight:bold;
}

.admin{background:#ffcc00;color:black;}
.peserta{background:#3498db;color:white;}

.wheelBox{
position:relative;
width:350px;
margin:auto;
}

canvas{
width:100%;
border-radius:50%;
background:#222;
transition:transform 7s cubic-bezier(.17,.67,.32,.99);
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:25px solid red;
z-index:10;
}

.spinBtn{
margin-top:20px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:12px;
background:#27ae60;
color:white;
cursor:pointer;
}

.listBox{
max-width:350px;
margin:auto;
margin-top:25px;
background:#1e1e1e;
border-radius:10px;
padding:10px;
}

.member{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #333;
}

.winner{
color:#777;
text-decoration:line-through;
}

.tag{
background:#ffcc00;
color:black;
font-size:11px;
padding:2px 6px;
border-radius:4px;
}

.stat{
max-width:350px;
margin:auto;
margin-top:20px;
}

.bar{
background:#3498db;
height:10px;
margin-top:3px;
border-radius:3px;
}

.resetBtn{
margin-top:20px;
font-size:12px;
background:none;
border:none;
color:#666;
cursor:pointer;
}

</style>
</head>

<body>

<h1>ARISAN DIGITAL</h1>
<div id="bulanText"></div>

<div class="modeBox">
<button class="modeBtn admin" onclick="setMode('admin')">MODE ADMIN</button>
<button class="modeBtn peserta" onclick="setMode('peserta')">MODE PESERTA</button>
</div>

<div id="modeText">Mode: ADMIN</div>

<div class="wheelBox">
<div class="pointer"></div>
<canvas id="wheel" width="500" height="500"></canvas>
</div>

<button class="spinBtn" onclick="startSpin()">SPIN</button>

<div class="listBox">
<h3>Peserta</h3>
<div id="memberList"></div>
</div>

<div class="stat">
<h3>Statistik Voting</h3>
<div id="statList"></div>
</div>

<button class="resetBtn" onclick="resetSystem()">Reset System</button>

<script>

const ADMIN_PIN="123456"

const NAMES=[
"Idam","Aki","Daeli","Ros","Dewi",
"Septi","Medina","Agus","Elis","Tri"
]

let mode="admin"

let winnerData=JSON.parse(localStorage.getItem("winnerData"))||{}
let voteData=JSON.parse(localStorage.getItem("voteData"))||{}
let spinLock=JSON.parse(localStorage.getItem("spinLock"))||{}

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

let rotation=0
let spinning=false

function getMonth(){
const m=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"]
return m[new Date().getMonth()]
}

document.getElementById("bulanText").innerText="Bulan "+getMonth()

function setMode(m){
mode=m
document.getElementById("modeText").innerText="Mode: "+m.toUpperCase()
}

function getActiveNames(){
return NAMES.filter(n=>!winnerData[n])
}

function drawWheel(){

const names=getActiveNames()

if(names.length===0){
ctx.clearRect(0,0,500,500)
ctx.fillStyle="white"
ctx.font="30px Arial"
ctx.textAlign="center"
ctx.fillText("SEMUA SUDAH MENANG",250,250)
return
}

const arc=(2*Math.PI)/names.length

ctx.clearRect(0,0,500,500)

names.forEach((name,i)=>{

let angle=i*arc

ctx.beginPath()
ctx.fillStyle=`hsl(${i*40},70%,50%)`
ctx.moveTo(250,250)
ctx.arc(250,250,250,angle-Math.PI/2,(angle+arc)-Math.PI/2)
ctx.fill()

ctx.save()
ctx.translate(250,250)
ctx.rotate(angle+arc/2-Math.PI/2)
ctx.fillStyle="white"
ctx.font="18px Arial"
ctx.textAlign="right"
ctx.fillText(name,210,5)
ctx.restore()

})

}

async function startSpin(){

if(spinning)return

if(mode==="admin"){

const {value:pin}=await Swal.fire({
title:"PIN ADMIN",
input:"password"
})

if(pin!==ADMIN_PIN){
Swal.fire("PIN Salah")
return
}

spinWheel(true)

}

if(mode==="peserta"){

const {value:name}=await Swal.fire({
title:"Pilih Nama Anda",
input:"select",
inputOptions:NAMES
})

if(spinLock[name]){
Swal.fire("Anda sudah spin bulan ini")
return
}

spinWheel(false,name)

}

}

function spinWheel(admin,name){

spinning=true

const names=getActiveNames()

let random=Math.floor(Math.random()*360)

rotation+=360*12+random

canvas.style.transform=`rotate(${rotation}deg)`

setTimeout(()=>{

const slice=360/names.length
const stop=rotation%360

const index=Math.floor((360-stop)/slice)%names.length

const winner=names[index]

if(admin){

winnerData[winner]=getMonth()
localStorage.setItem("winnerData",JSON.stringify(winnerData))

showWinner(winner)

}

else{

spinLock[name]=true

voteData[winner]=(voteData[winner]||0)+1

localStorage.setItem("spinLock",JSON.stringify(spinLock))
localStorage.setItem("voteData",JSON.stringify(voteData))

Swal.fire("Hasil Spin Anda",winner)

renderStats()

}

spinning=false

drawWheel()
renderMembers()

},7000)

}

function showWinner(name){

Swal.fire({
title:"PEMENANG BULAN "+getMonth(),
html:`<h1 style="color:#ffcc00">${name}</h1>`,
icon:"success"
})

confetti({
particleCount:200,
spread:90
})

}

function renderMembers(){

let html=""

NAMES.forEach(n=>{

if(winnerData[n]){

html+=`
<div class="member winner">
<span>✔ ${n}</span>
<span class="tag">${winnerData[n]}</span>
</div>
`

}

else{

html+=`
<div class="member">
<span>⭕ ${n}</span>
</div>
`

}

})

document.getElementById("memberList").innerHTML=html

}

function renderStats(){

let html=""

let max=0

for(let n in voteData){
if(voteData[n]>max)max=voteData[n]
}

for(let n in voteData){

let v=voteData[n]

let w=(v/max)*100

html+=`
<div>
${n} (${v})
<div class="bar" style="width:${w}%"></div>
</div>
`

}

document.getElementById("statList").innerHTML=html

}

function resetSystem(){

localStorage.clear()
location.reload()

}

drawWheel()
renderMembers()
renderStats()

</script>

</body>
</html>
