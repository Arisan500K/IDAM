<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISAN BULANAN 500K</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #121212; --glass: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        .clock-outer { position: relative; width: 320px; height: 320px; border: 12px solid #333; border-radius: 50%; background: #222; box-shadow: 0 0 40px rgba(0,0,0,0.8); margin: 20px 0; }
        #canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 7s cubic-bezier(0.15, 0, 0.1, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 35px; height: 45px; clip-path: polygon(50% 100%, 0 0, 100% 0); background: #ff3e3e; z-index: 100; }

        .panel { background: #1e1e1e; padding: 20px; border-radius: 20px; width: 100%; max-width: 480px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .member-list { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 15px 0; text-align: left; }
        .member-item { padding: 10px 15px; background: var(--glass); border-radius: 8px; font-size: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .member-item.winner { border-color: var(--gold); background: rgba(255, 204, 0, 0.05); }
        .win-tag { font-size: 11px; background: var(--gold); color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        button { background: linear-gradient(145deg, #ffcc00, #d4ac00); color: #000; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-reset { background: none; border: 1px solid #444; color: #666; margin-top: 15px; padding: 8px; font-size: 11px; text-transform: uppercase; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h2 id="monthTitle" style="color: var(--gold); margin-bottom: 5px; letter-spacing: 1px;">ARISAN DIGITAL</h2>
    
    <div class="clock-outer">
        <div class="pointer"></div>
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <div class="panel">
        <div id="memberContainer" class="member-list"></div>
        <button onclick="authAdmin()">KOCOK SEKARANG</button>
        <button class="btn-reset" onclick="resetDataWithPin()">Reset Data (Butuh PIN)</button>
    </div>

<script>
    const KODE_ADMIN = "080522"; // PIN UNTUK SPIN & RESET
    const MASTER_NAMES = ["Idam", "Aki", "Daeli", "Ros", "Dewi", "Septi", "medina", "Agus", "Elis", "Tri"];
    
    // Format data: { "Nama": "Bulan Menang" }
    let winnerData = JSON.parse(localStorage.getItem('arisan_history')) || {};
    let currentRotation = 0;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#d35400'];

    function getMonthName() {
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        return months[new Date().getMonth()];
    }

    function init() {
        document.getElementById('monthTitle').innerText = "ARISAN BULAN " + getMonthName().toUpperCase();
        renderMembers();
        drawWheel();
    }

    function renderMembers() {
        const container = document.getElementById('memberContainer');
        container.innerHTML = "";
        MASTER_NAMES.forEach(name => {
            const monthWon = winnerData[name];
            container.innerHTML += `
                <div class="member-item ${monthWon ? 'winner' : ''}">
                    <span>${monthWon ? '✅' : '⚪'} ${name}</span>
                    ${monthWon ? `<span class="win-tag">MENANG: ${monthWon}</span>` : ''}
                </div>`;
        });
    }

    function drawWheel() {
        const winners = Object.keys(winnerData);
        const activeNames = MASTER_NAMES.filter(n => !winners.includes(n));
        
        if (activeNames.length === 0) {
            ctx.clearRect(0, 0, 800, 800);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "30px Arial";
            ctx.fillText("Semua Sudah Menang!", 400, 400);
            return;
        }

        const arc = (2 * Math.PI) / activeNames.length;
        ctx.clearRect(0, 0, 800, 800);
        activeNames.forEach((name, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(400, 400);
            ctx.arc(400, 400, 400, angle - Math.PI/2, (angle + arc) - Math.PI/2);
            ctx.fill();
            ctx.stroke();
            ctx.save();
            ctx.translate(400, 400);
            ctx.rotate(angle + arc / 2 - Math.PI/2);
            ctx.textAlign = "right"; ctx.fillStyle = "#fff"; ctx.font = "bold 42px Arial";
            ctx.fillText(name, 350, 15);
            ctx.restore();
        });
    }

    async function authAdmin() {
        const currentMonth = getMonthName();
        const existingWinnerThisMonth = Object.keys(winnerData).find(key => winnerData[key] === currentMonth);

        // FITUR KUNCI: Jika sudah ada pemenang di bulan ini, tampilkan langsung
        if (existingWinnerThisMonth) {
            Swal.fire({
                title: `Hasil Bulan ${currentMonth}`,
                html: `Pemenang bulan ini adalah:<br><h1 style="color:#ffcc00">${existingWinnerThisMonth}</h1><p style="font-size:12px; color:#aaa;">Hasil sudah terkunci hingga bulan depan.</p>`,
                icon: 'info'
            });
            return;
        }

        const { value: pass } = await Swal.fire({
            title: 'Verifikasi PIN Admin',
            input: 'password',
            inputPlaceholder: 'Masukkan PIN'
        });

        if (pass === KODE_ADMIN) {
            executeSpin();
        } else if (pass) {
            Swal.fire('Salah!', 'PIN Salah!', 'error');
        }
    }

    function executeSpin() {
        const winners = Object.keys(winnerData);
        const activeNames = MASTER_NAMES.filter(n => !winners.includes(n));
        
        const putaranAcak = Math.floor(Math.random() * 360);
        const totalDerajat = (360 * 10) + putaranAcak; 
        currentRotation += totalDerajat;

        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const stopAngle = currentRotation % 360;
            const sliceSize = 360 / activeNames.length;
            const winningIndex = Math.floor((360 - stopAngle) / sliceSize) % activeNames.length;
            const pemenang = activeNames[winningIndex];

            // Simpan ke data permanen
            winnerData[pemenang] = getMonthName();
            localStorage.setItem('arisan_history', JSON.stringify(winnerData));

            Swal.fire({
                title: `Pemenang Arisan ${getMonthName()}`,
                html: `<h1 style="color:#ffcc00; font-size: 50px;">${pemenang}</h1>`,
                icon: 'success'
            }).then(() => {
                init();
            });
        }, 7000);
    }

    async function resetDataWithPin() {
        const { value: pass } = await Swal.fire({
            title: 'Reset Seluruh Data?',
            input: 'password',
            inputLabel: 'Masukkan PIN Admin untuk konfirmasi reset',
            showCancelButton: true
        });

        if (pass === KODE_ADMIN) {
            localStorage.clear();
            winnerData = {};
            init();
            Swal.fire('Data Dihapus!', 'Sistem kembali ke awal.', 'success');
        } else if (pass) {
            Swal.fire('Gagal!', 'PIN Salah.', 'error');
        }
    }

    init();
</script>
</body>
</html>
