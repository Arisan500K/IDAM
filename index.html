<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISAN PRO</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --primary:#facc15;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  max-width:500px;
  width:100%;
  padding:15px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

h1{text-align:center;color:var(--primary)}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.main{background:var(--primary);color:black}

#wheelBox{
  position:relative;
  width:320px;
  height:320px;
  margin:20px auto;
}

#pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:25px solid var(--primary);
  z-index:10;
}

canvas{
  width:100%;
  height:100%;
  border-radius:50%;
  border:6px solid #334155;
}
</style>
</head>

<body>

<div class="container">

<h1>ARISAN PRO</h1>
<div style="text-align:center">Bulan <b id="month"></b></div>

<div id="wheelBox">
<div id="pointer"></div>
<canvas id="wheel" width="600" height="600"></canvas>
</div>

<div class="card">

<button class="main" onclick="login()">LOGIN</button>

<select id="user"></select>

<div id="status"></div>

<button class="main" onclick="spin()" id="spinBtn">SPIN</button>

</div>

<div class="card">
<h3>Log</h3>
<div id="log"></div>
</div>

</div>

<script>

// ===== API =====
const API = "https://script.google.com/macros/s/AKfycbz4XdH8Y-7-lHyQH3lH9FixIwsrGoLbbnqfshfS6Ww/exec";

// ===== STATE =====
let db = {};
let currentAngle = 0;
let spinning = false;

// ===== API WRAPPER =====
async function api(data){
  const res = await fetch(API,{
    method:'POST',
    body:JSON.stringify(data),
    headers:{ "Content-Type":"text/plain;charset=utf-8" }
  });
  return await res.json();
}

// ===== LOAD =====
async function load(){
  db = await api({action:"get"});

  month.innerText = db.month;

  user.innerHTML = db.members.map(m=>`<option>${m.name}</option>`).join("");

  log.innerHTML = db.votes.map(v=>`${v.user} → ${v.result}<br>`).join("");

  drawWheel();
  updateStatus();
}

// ===== STATUS =====
function updateStatus(){
  const m = db.members.find(x=>x.name===user.value);
  const v = db.votes.find(x=>x.user===user.value);

  if(!m) return;

  if(m.status !== "Lunas"){
    status.innerText = "❌ Belum bayar";
    spinBtn.disabled = true;
  }
  else if(v){
    status.innerText = "✅ Sudah spin: "+v.result;
    spinBtn.disabled = true;
  }
  else{
    status.innerText = "🟢 Bisa spin";
    spinBtn.disabled = false;
  }
}

user.onchange = updateStatus;

// ===== DRAW WHEEL =====
function drawWheel(){
  const ctx = wheel.getContext("2d");
  const total = db.members.length;
  const arc = Math.PI*2/total;

  ctx.clearRect(0,0,600,600);

  db.members.forEach((m,i)=>{
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i*40},70%,50%)`;
    ctx.moveTo(300,300);
    ctx.arc(300,300,300,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(300,300);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(m.name,250,10);
    ctx.restore();
  });
}

// ===== LOGIN =====
async function login(){
  const n = prompt("Nama");
  const p = prompt("PIN");

  const r = await api({action:"login",n,p});

  if(r.status==="ok"){
    user.value = n;
    alert("Login sukses");
    updateStatus();
  }else{
    alert("Login gagal");
  }
}

// ===== SPIN (REAL ANIMATION) =====
async function spin(){

  if(spinning) return;
  spinning = true;

  // ambil hasil dari server
  const r = await api({
    action:"vote",
    user:user.value
  });

  if(r.status==="not_paid"){
    alert("Belum bayar");
    spinning=false;
    return;
  }

  const resultName = r.result;

  const index = db.members.findIndex(m=>m.name===resultName);

  const total = db.members.length;
  const arc = 360/total;

  // target angle
  const targetAngle = (360 - (index * arc + arc/2));

  // putar beberapa kali + berhenti di target
  const finalAngle = currentAngle + 360*5 + targetAngle;

  animateSpin(finalAngle, resultName);
}

// ===== ANIMATION ENGINE =====
function animateSpin(target, result){

  const duration = 4000;
  const start = performance.now();
  const initial = currentAngle;

  function easeOut(t){
    return 1 - Math.pow(1-t,3);
  }

  function frame(now){
    const progress = (now - start) / duration;

    if(progress < 1){
      const eased = easeOut(progress);
      currentAngle = initial + (target - initial) * eased;

      wheel.style.transform = `rotate(${currentAngle}deg)`;

      requestAnimationFrame(frame);
    }else{
      currentAngle = target;
      wheel.style.transform = `rotate(${currentAngle}deg)`;

      confetti();

      Swal.fire("🎉 Hasil", result, "success");

      spinning = false;
      load();
    }
  }

  requestAnimationFrame(frame);
}

// ===== INIT =====
load();

</script>

</body>
</html>
