<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISAN BULANAN Rp500.000</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #facc15; 
            --text: #f8fafc; --success: #22c55e; --danger: #ef4444; 
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 500px; width: 100%; margin-bottom: 50px; }
        
        /* Header Section */
        header { text-align: center; margin: 20px 0; }
        header h1 { margin: 0; font-size: 1.8rem; color: var(--accent); letter-spacing: 1px; }
        .month-badge { background: #334155; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; display: inline-block; margin-top: 5px; }

        /* Wheel Section */
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 25px auto; }
        #pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-bottom: 30px solid var(--accent); z-index: 10; 
        }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #334155; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        /* Card System */
        .card { 
            background: var(--card); padding: 18px; border-radius: 16px; 
            margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* Inputs & Buttons */
        select, input { 
            width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; 
            color: white; border: 1px solid #475569; font-size: 1rem; margin-bottom: 10px;
        }
        .btn { 
            padding: 14px; border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; width: 100%; transition: 0.3s; font-size: 0.9rem; text-transform: uppercase;
        }
        .btn-vote { background: var(--success); color: white; box-shadow: 0 4px 0 #15803d; }
        .btn-vote:active { transform: translateY(3px); box-shadow: none; }
        .btn-iseng { background: #475569; color: white; }
        .btn-admin-mode { background: transparent; border: 1px dashed #475569; color: #64748b; margin-top: 20px; }

        /* Status & Stats */
        .status-msg { padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; text-align: center; }
        .paid { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid #14532d; }
        .unpaid { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid #7f1d1d; }

        .stat-item { margin-bottom: 12px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }
        .bar-bg { background: #334155; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { background: var(--accent); height: 100%; transition: 1s cubic-bezier(0.1, 0, 0.1, 1); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; color: #94a3b8; font-weight: normal; padding-bottom: 8px; }
        td { padding: 12px 0; border-top: 1px solid #1e293b; }

        /* Admin Dashboard UI */
        .admin-box { border: 2px solid var(--accent) !important; animation: borderPulse 2s infinite; }
        @keyframes borderPulse { 0% { border-color: #facc15; } 50% { border-color: #854d0e; } 100% { border-color: #facc15; } }
        
        .pay-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; background: #0f172a; border-radius: 8px; margin-bottom: 8px;
        }

        /* Overlay */
        .loader { 
            position: fixed; inset: 0; background: rgba(15,23,42,0.95); 
            display: none; align-items: center; justify-content: center; z-index: 9999; 
            flex-direction: column; gap: 15px;
        }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div style="width: 50px; height: 50px; border: 5px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <span style="font-weight: bold; letter-spacing: 1px;">SINKRONISASI DATA...</span>
</div>

<div class="container">
    <header>
        <h1>ARISAN IDAM</h1>
        <div class="month-badge">Periode: <b>Bulan <span id="monthTxt">1</span></b></div>
    </header>

    <div class="wheel-box">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div class="card">
        <h3>👤 Nama Anggota</h3>
        <select id="userSelect" onchange="updateUI()"></select>
        <div id="statusMsg" class="status-msg"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <button class="btn btn-iseng" onclick="spin(true)">Putar Iseng</button>
            <button id="voteBtn" class="btn btn-vote" onclick="spin(false)">Vote Resmi</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 Perolehan Vote</h3>
        <div id="statList">Memuat perolehan...</div>
    </div>

    <div class="card">
        <h3>🏆 Riwayat Pemenang</h3>
        <table>
            <thead><tr><th>Bulan</th><th>Nama</th></tr></thead>
            <tbody id="winTableBody"></tbody>
        </table>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="card admin-box">
            <h3 style="color:var(--accent)">🛡️ Dashboard Ketua (Admin)</h3>
            
            <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px;">+ Tambah Anggota Baru:</p>
            <div style="display:flex; gap:8px; margin-bottom:20px;">
                <input type="text" id="newMemberName" placeholder="Nama..." style="margin-bottom:0;">
                <button onclick="addMember()" style="padding:0 20px; background:var(--accent); border:none; border-radius:10px; font-weight:bold;">Tambah</button>
            </div>

            <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px;">Manajemen Pembayaran:</p>
            <div id="adminPayList" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px;"></div>

            <button class="btn" style="background:var(--accent); color:black;" onclick="determineWinner()">RESET & TETAPKAN PEMENANG</button>
        </div>
    </div>

    <button class="btn btn-admin-mode" onclick="authAdmin()">🔐 Mode Pengelola</button>
</div>

<script>
// --- KONFIGURASI ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznGdhfxYvlbm3W1JiqFPt1siT008NgcLAzRJp7I5wARzagHe1VeAU9wvEdBwyDSRGs/exec"; 

let db = { members: [], votes: [], month: 1 };
let angle = 0, isSpinning = false;
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

async function loadData() {
    try {
        const res = await fetch(SCRIPT_URL);
        db = await res.json();
        render();
    } catch(e) { console.error("Database Offline"); }
}

function render() {
    document.getElementById("monthTxt").innerText = db.month;
    
    // Member Select
    const select = document.getElementById("userSelect");
    select.innerHTML = db.members.map(m => `<option value="${m[0]}">${m[0]} ${m[1]=='Lunas'?'(Lunas)':'(Belum)'}</option>`).join("");
    
    // Admin Pay List
    const adminPayList = document.getElementById("adminPayList");
    adminPayList.innerHTML = db.members.map(m => `
        <div class="pay-row">
            <span>${m[0]}</span>
            <button onclick="togglePay('${m[0]}', '${m[1]}')" style="background:${m[1]=='Lunas'?'#064e3b':'#7f1d1d'}; color:${m[1]=='Lunas'?'#6ee7b7':'#fca5a5'}; border:1px solid ${m[1]=='Lunas'?'#065f46':'#991b1b'}; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.75rem;">
                ${m[1].toUpperCase()}
            </button>
        </div>
    `).join("");

    // Stats
    const total = db.votes.length || 1;
    document.getElementById("statList").innerHTML = db.members.map(m => {
        const vCount = db.votes.filter(v => v[1] === m[0]).length;
        const winnerBulan = db.members.find(x => x[0] === m[0] && x[2] !== "");
        return `<div class="stat-item">
            <div class="stat-label">
                <span style="${winnerBulan ? 'color:var(--accent); font-weight:bold' : ''}">${m[0]} ${winnerBulan ? '🏆' : ''}</span>
                <span>${vCount} Vote</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" style="width:${(vCount/total)*100}%"></div></div>
        </div>`;
    }).join("");

    // Winners
    document.getElementById("winTableBody").innerHTML = db.members.filter(m => m[2] !== "").map(m => 
        `<tr><td>Bulan ${m[2]}</td><td><b>${m[0]}</b></td></tr>`).join("");

    updateUI();
    drawWheel();
}

function drawWheel() {
    const names = db.members.map(m => m[0]);
    if(names.length == 0) return;
    const arc = (Math.PI * 2) / names.length;
    const colors = ["#ef4444", "#f59e0b", "#84cc16", "#06b6d4", "#3b82f6", "#a855f7", "#ec4899", "#f97316", "#10b981", "#eab308"];
    
    ctx.clearRect(0,0,500,500);
    names.forEach((m, i) => {
        ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(250, 250);
        ctx.arc(250, 250, 250, angle + i * arc, angle + (i+1) * arc); ctx.fill();
        ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + i * arc + arc/2);
        ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "right";
        ctx.fillText(m, 230, 8); ctx.restore();
    });
}

function updateUI() {
    const user = document.getElementById("userSelect").value;
    const info = db.members.find(m => m[0] === user);
    const msg = document.getElementById("statusMsg");
    const btn = document.getElementById("voteBtn");

    if(info && info[1] === "Lunas") {
        msg.className = "status-msg paid";
        msg.innerText = "Status: LUNAS. Hak Vote Anda Aktif!";
        btn.disabled = false; btn.style.opacity = "1";
    } else {
        msg.className = "status-msg unpaid";
        msg.innerText = "Status: BELUM BAYAR. Vote Terkunci.";
        btn.disabled = true; btn.style.opacity = "0.4";
    }
}

function spin(isDemo) {
    if (isSpinning) return;
    isSpinning = true;
    let speed = Math.random() * 0.15 + 0.45;
    function anim() {
        speed *= 0.985; angle += speed; drawWheel();
        if(speed > 0.002) requestAnimationFrame(anim);
        else {
            isSpinning = false;
            const names = db.members.map(m => m[0]);
            const res = names[Math.floor((names.length - (angle % (Math.PI*2)) / ((Math.PI*2)/names.length)) % names.length)];
            if(!isDemo) handleVote(res);
            else alert("🔴 HASIL ISENG: " + res);
        }
    }
    anim();
}

async function handleVote(res) {
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'vote', user: document.getElementById("userSelect").value, result: res }) });
    document.getElementById("loader").style.display = "none";
    alert("VOTE TERSIMPAN!"); loadData();
}

function authAdmin() {
    if(prompt("PIN KETUA:") === "1234") {
        document.getElementById("adminPanel").style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
}

async function addMember() {
    const name = document.getElementById("newMemberName").value;
    if(!name) return;
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add_member', name: name }) });
    document.getElementById("newMemberName").value = "";
    await loadData(); document.getElementById("loader").style.display = "none";
}

async function togglePay(name, current) {
    const next = current === "Lunas" ? "Belum" : "Lunas";
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'update_pay', name: name, status: next }) });
    await loadData(); document.getElementById("loader").style.display = "none";
}

async function determineWinner() {
    let win = "";
    if(db.month == 1) win = "Idam";
    else if(db.month == 10) win = "Agus";
    else {
        let counts = {};
        db.votes.forEach(v => counts[v[1]] = (counts[v[1]] || 0) + 1);
        let sorted = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
        win = sorted.find(n => !db.members.find(m => m[0] === n && m[2] !== ""));
    }
    
    if(!win || !confirm(`Bulan ${db.month}: Sahkan ${win} sebagai pemenang?`)) return;

    document.getElementById("loader").style.display = "flex";
    confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'set_winner', name: win, month: db.month }) });
    await loadData(); document.getElementById("loader").style.display = "none";
}

loadData();
setInterval(loadData, 45000); // Auto-sync 45 detik sekali
</script>
</body>
</html>
