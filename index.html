<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISAN PRO</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center}
.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px}
button{padding:10px;width:100%;margin-top:10px}
</style>
</head>

<body>

<h2>ARISAN PRO</h2>
<div>Bulan: <b id="month"></b></div>

<div class="card">
<button onclick="login()">LOGIN</button>
<select id="user"></select>
<div id="status"></div>
<button onclick="spin()" id="spinBtn">SPIN</button>
</div>

<div class="card">
<h3>LOG</h3>
<div id="log"></div>
</div>

<div id="admin" style="display:none" class="card">
<h3>ADMIN</h3>
<select id="winner"></select>
<button onclick="setWinner()">SET PEMENANG</button>

<input id="monthSet" type="number" placeholder="bulan">
<button onclick="setMonth()">SET BULAN</button>

<button onclick="resetAll()">RESET</button>
</div>

<button onclick="adminLogin()">ADMIN</button>

<script>

const API = "https://script.google.com/macros/s/AKfycbz4XdH8Y-7-lHyQH3lH9FixIwsrGoLbbnqfshfS6Ww/exec";

let db = {};

// ================= CORE FETCH (ANTI CORS) =================
async function api(data){
  const res = await fetch(API,{
    method:'POST',
    body: JSON.stringify(data),
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    }
  });
  return await res.json();
}

// ================= LOAD =================
async function load(){
  db = await api({action:"get"});

  month.innerText = db.month;

  user.innerHTML = db.members.map(m=>`<option>${m.name}</option>`).join("");
  winner.innerHTML = user.innerHTML;

  log.innerHTML = db.votes.map(v=>`${v.user} → ${v.result}<br>`).join("");

  updateStatus();
}

// ================= STATUS =================
function updateStatus(){
  const m = db.members.find(x=>x.name===user.value);
  const v = db.votes.find(x=>x.user===user.value);

  if(!m) return;

  if(m.status !== "Lunas"){
    status.innerText = "❌ Belum bayar";
    spinBtn.disabled = true;
  }
  else if(v){
    status.innerText = "✅ Sudah spin: "+v.result;
    spinBtn.disabled = true;
  }
  else{
    status.innerText = "🟢 Bisa spin";
    spinBtn.disabled = false;
  }
}

user.onchange = updateStatus;

// ================= LOGIN =================
async function login(){
  const n = prompt("Nama");
  const p = prompt("PIN");

  const r = await api({
    action:"login",
    n,p
  });

  if(r.status==="ok"){
    user.value = n;
    alert("Login berhasil");
    updateStatus();
  }else{
    alert("Login gagal");
  }
}

// ================= SPIN =================
async function spin(){
  const r = await api({
    action:"vote",
    user:user.value
  });

  if(r.status==="not_paid"){
    alert("Belum bayar!");
    return;
  }

  if(r.status==="already"){
    alert("Sudah spin: "+r.result);
    return;
  }

  confetti();
  alert("Hasil: "+r.result);

  load();
}

// ================= ADMIN =================
function adminLogin(){
  const pin = prompt("PIN ADMIN");

  if(pin==="280498"){
    admin.style.display="block";
  }
}

async function setWinner(){
  await api({
    action:"set_winner_target",
    name:winner.value
  });
  load();
}

async function setMonth(){
  await api({
    action:"set_month",
    month:parseInt(monthSet.value)
  });
  load();
}

async function resetAll(){
  await api({action:"reset_all"});
  load();
}

load();

</script>

</body>
</html>
