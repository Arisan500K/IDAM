<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ARISAN BULANAN 500K</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#facc15;
}

.subtitle{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:15px;
margin:15px auto;
max-width:450px;
}

canvas{
width:100%;
border-radius:50%;
background:#111827;
transition:transform 7s cubic-bezier(.17,.67,.32,.99);
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;

border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:24px solid red;
}

.wheelBox{
position:relative;
width:320px;
margin:auto;
}

.spinBtn{
margin-top:15px;
padding:14px 40px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

.member{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #334155;
}

.bar{
background:#38bdf8;
height:10px;
margin-top:3px;
border-radius:4px;
}

.small{
font-size:12px;
color:#94a3b8;
}

.resetBtn{
margin-top:10px;
font-size:12px;
background:none;
border:none;
color:#94a3b8;
cursor:pointer;
}

.payCheck{
cursor:pointer;
}

.winnerBox{

font-size:30px;
font-weight:bold;
margin:10px;

animation:blink 1s infinite;
}

@keyframes blink{
0%{color:red}
25%{color:yellow}
50%{color:lime}
75%{color:cyan}
100%{color:magenta}
}

</style>
</head>

<body>

<h1>ARISAN BULANAN 500K</h1>
<div class="subtitle">Ketua: Idam</div>

<div id="bulanText"></div>

<div id="winnerBox" class="winnerBox"></div>

<div class="card">

<div class="wheelBox">

<div class="pointer"></div>
<canvas id="wheel" width="500" height="500"></canvas>

</div>

<button class="spinBtn" onclick="startSpin()">SPIN / PUTAR</button>

<div id="progressSpin" class="small"></div>

</div>

<div class="card">

<h3>Daftar Pembayaran Bulan Ini</h3>

<div id="payList"></div>

<button onclick="adminMode()">Edit Pembayaran (Admin)</button>

</div>

<div class="card">

<h3>Daftar Peserta</h3>

<div id="memberList"></div>

</div>

<div class="card">

<h3>Statistik Voting</h3>

<div id="statList"></div>

</div>

<div class="card">

<h3>Riwayat Spin</h3>

<div id="spinHistory"></div>

</div>

<button class="resetBtn" onclick="resetSystem()">Reset Sistem</button>

<script>

const RESET_PIN="080522"
const ADMIN_PIN="080522"

const NAMES=[
"Idam","Aki","Daeli","Ros","Dewi",
"Septi","Medina","Agus","Elis","Tri"
]

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

let rotation=0
let spinning=false
let admin=false

let winnerData=JSON.parse(localStorage.getItem("winnerData"))||{}
let voteData=JSON.parse(localStorage.getItem("voteData"))||{}
let spinResults=JSON.parse(localStorage.getItem("spinResults"))||{}
let payData=JSON.parse(localStorage.getItem("payData"))||{}

function getMonth(){

const m=[
"Januari","Februari","Maret","April",
"Mei","Juni","Juli","Agustus",
"September","Oktober","November","Desember"
]

return m[new Date().getMonth()]

}

document.getElementById("bulanText").innerText="Bulan "+getMonth()

if(getMonth()=="Maret" && !winnerData["Idam"]){

winnerData["Idam"]="Maret"
localStorage.setItem("winnerData",JSON.stringify(winnerData))

}

function getActiveNames(){

return NAMES.filter(n=>!winnerData[n])

}

function drawWheel(){

const names=getActiveNames()

if(names.length===0){

ctx.clearRect(0,0,500,500)
ctx.fillStyle="white"
ctx.font="28px Arial"
ctx.textAlign="center"
ctx.fillText("SEMUA SUDAH MENANG",250,250)

return

}

const arc=(2*Math.PI)/names.length

ctx.clearRect(0,0,500,500)

names.forEach((name,i)=>{

let angle=i*arc

ctx.beginPath()
ctx.fillStyle=`hsl(${i*40},70%,50%)`
ctx.moveTo(250,250)
ctx.arc(250,250,250,angle-Math.PI/2,(angle+arc)-Math.PI/2)
ctx.fill()

ctx.save()

ctx.translate(250,250)
ctx.rotate(angle+arc/2-Math.PI/2)

ctx.fillStyle="white"
ctx.font="18px Arial"
ctx.textAlign="right"

ctx.fillText(name,210,5)

ctx.restore()

})

}

async function startSpin(){

if(spinning)return

if(getWinnerMonth()){

Swal.fire("Bulan ini sudah ada pemenang!")
return

}

const {value:name}=await Swal.fire({
title:"Pilih Nama Anda",
input:"select",
inputOptions:NAMES
})

if(spinResults[name]){

Swal.fire("Anda sudah spin",spinResults[name])
return

}

spinWheel(name)

}

function spinWheel(name){

spinning=true

const names=getActiveNames()

let random=Math.floor(Math.random()*360)

rotation+=360*10+random

canvas.style.transform=`rotate(${rotation}deg)`

setTimeout(()=>{

const slice=360/names.length
const stop=rotation%360
const index=Math.floor((360-stop)/slice)%names.length

const winner=names[index]

spinResults[name]=winner
voteData[winner]=(voteData[winner]||0)+1

localStorage.setItem("spinResults",JSON.stringify(spinResults))
localStorage.setItem("voteData",JSON.stringify(voteData))

Swal.fire("Hasil Spin Anda",winner)

spinning=false

drawWheel()

renderAll()

checkWinner()

},7000)

}

function checkWinner(){

const total=NAMES.length-1
const done=Object.keys(spinResults).length

if(done===total && !getWinnerMonth()){

let max=0
let winner=""

for(let n in voteData){

if(voteData[n]>max){

max=voteData[n]
winner=n

}

}

winnerData[winner]=getMonth()

localStorage.setItem("winnerData",JSON.stringify(winnerData))

confetti({
particleCount:200,
spread:100
})

renderWinner()

}

}

function getWinnerMonth(){

for(let n in winnerData){

if(winnerData[n]==getMonth()) return n

}

return null

}

function renderWinner(){

const w=getWinnerMonth()

if(w){

document.getElementById("winnerBox").innerHTML="PEMENANG BULAN INI<br>"+w

}

}

function renderMembers(){

let html=""

NAMES.forEach(n=>{

if(winnerData[n]){

html+=`<div class="member">${n} ✔ (${winnerData[n]})</div>`

}else{

html+=`<div class="member">${n}</div>`

}

})

document.getElementById("memberList").innerHTML=html

}

function renderStats(){

let html=""

let max=0

for(let n in voteData){

if(voteData[n]>max)max=voteData[n]

}

for(let n in voteData){

let v=voteData[n]

let w=(v/max)*100

html+=`

<div>

${n} (${v})

<div class="bar" style="width:${w}%"></div>

</div>

`

}

document.getElementById("statList").innerHTML=html

}

function renderHistory(){

let html=""

for(let n in spinResults){

html+=`<div>${n} → ${spinResults[n]}</div>`

}

document.getElementById("spinHistory").innerHTML=html

}

function renderPay(){

let html=""

NAMES.forEach(n=>{

let checked=payData[n]?"✔":"❌"

html+=`<div class="member">

<span>${n}</span>

<span class="payCheck" onclick="togglePay('${n}')">${checked}</span>

</div>`

})

document.getElementById("payList").innerHTML=html

}

function togglePay(n){

if(!admin)return

payData[n]=!payData[n]

localStorage.setItem("payData",JSON.stringify(payData))

renderPay()

}

async function adminMode(){

const {value:pin}=await Swal.fire({

title:"PIN Admin",
input:"password"

})

if(pin===ADMIN_PIN){

admin=true

Swal.fire("Mode Admin Aktif")

}else{

Swal.fire("PIN Salah")

}

}

function renderProgress(){

const total=NAMES.length-1
const done=Object.keys(spinResults).length

document.getElementById("progressSpin").innerText=

done+" / "+total+" peserta sudah spin"

}

async function resetSystem(){

const {value:pin}=await Swal.fire({
title:"Masukkan PIN Reset",
input:"password"
})

if(pin!==RESET_PIN){

Swal.fire("PIN Salah")
return

}

localStorage.clear()

location.reload()

}

function renderAll(){

renderMembers()
renderStats()
renderHistory()
renderProgress()
renderPay()
renderWinner()

}

drawWheel()
renderAll()

</script>

</body>
</html>
