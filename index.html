<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISAN IDAM DIGITAL v5</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #facc15; --text: #f8fafc; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        
        /* TIMER UI */
        .timer-box { background: #450a0a; color: #fca5a5; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; border: 1px solid #991b1b; }
        .timer-val { font-size: 1.3rem; font-weight: bold; color: white; display: block; }

        /* WHEEL UI */
        .wheel-box { position: relative; width: 310px; height: 310px; margin: 25px auto; }
        #pointer { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 30px solid var(--accent); /* Menunjuk ke bawah */
            z-index: 10; 
        }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #334155; box-shadow: 0 0 25px rgba(0,0,0,0.6); }

        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #334155; }
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; }

        .btn { padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-vote { background: var(--success); color: white; box-shadow: 0 4px 0 #15803d; }
        .btn-vote:disabled { background: #475569; box-shadow: none; opacity: 0.5; }
        
        select, input { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #475569; margin-bottom: 10px; box-sizing: border-box; }
        
        .progress-bar { background: #334155; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .progress-fill { background: var(--accent); height: 100%; transition: 1s cubic-bezier(0.1, 0, 0.1, 1); }

        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader" class="overlay">⏳ <b>SINKRONISASI DATABASE...</b></div>

<div class="container">
    <div class="timer-box">
        <small>WAKTU VOTE BERAKHIR DALAM:</small>
        <span id="countdown" class="timer-val">Memuat Timer...</span>
        <small>Batas: H-12 Sebelum Akhir Bulan</small>
    </div>

    <header style="text-align:center; margin-bottom: 15px;">
        <h1 style="color:var(--accent); margin:0; letter-spacing: 1px;">🎡 ARISAN IDAM</h1>
        <div style="background:#334155; display:inline-block; padding:4px 15px; border-radius:20px; font-size:0.85rem; margin-top:5px;">
            Periode: <b>Bulan <span id="monthTxt">...</span></b>
        </div>
    </header>

    <div class="wheel-box">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div class="card">
        <h3>👤 Pilih Nama Anda</h3>
        <select id="userSelect" onchange="checkAccess()"></select>
        <div id="statusMsg" style="margin-bottom:12px; text-align:center; font-weight:bold; font-size:0.9rem;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <button class="btn" style="background:#475569; color:white;" onclick="spin(true)">Putar Iseng</button>
            <button id="voteBtn" class="btn btn-vote" onclick="spin(false)">Vote Resmi</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 Grafik Perolehan Vote</h3>
        <div id="statList"></div>
    </div>

    <div id="adminArea" style="display:none;">
        <div class="card" style="border: 2px solid var(--accent);">
            <h3 style="color:var(--accent)">🛡️ DASHBOARD KETUA</h3>
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <input type="text" id="newMemberName" placeholder="Nama Baru..." style="margin-bottom:0;">
                <button onclick="addMember()" style="background:var(--accent); border:none; border-radius:10px; padding:0 15px; font-weight:bold; cursor:pointer;">Tambah</button>
            </div>
            <div id="payList" style="max-height:200px; overflow-y:auto; background:#0f172a; padding:10px; border-radius:10px; border:1px solid #334155;"></div>
            <button class="btn" style="background:var(--accent); color:black; margin-top:15px;" onclick="determineWinner()">TETAPKAN PEMENANG & LANJUT BULAN</button>
        </div>
    </div>

    <div class="card">
        <h3>🏆 Riwayat Pemenang</h3>
        <table style="width:100%; text-align:left; border-collapse:collapse;">
            <tbody id="winTableBody"></tbody>
        </table>
    </div>

    <button onclick="loginAdmin()" style="background:transparent; border:none; color:#475569; width:100%; margin:20px 0; cursor:pointer;">Mode Pengelola (PIN)</button>
</div>

<script>
// --- KONFIGURASI ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo_9vsYAlyAMshZ-X83c3qL-ZQ1IUY3CSYOCZdBvJpoVt1jBtsmN5qSqP0M_OLQTQR/exec"; 

let db = { members: [], votes: [], month: 1 };
let angle = 0, isSpinning = false, isTimeUp = false;

// --- LOGIKA TIMER H-12 ---
function updateTimer() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const lastDay = new Date(year, month + 1, 0);
    const deadline = new Date(year, month, lastDay.getDate() - 11, 23, 59, 59);
    
    const diff = deadline - now;
    const cd = document.getElementById("countdown");

    if (diff <= 0) {
        cd.innerText = "PEMILIHAN DITUTUP";
        isTimeUp = true;
    } else {
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);
        cd.innerText = `${d} Hari ${h}:${m}:${s}`;
        isTimeUp = false;
    }
    checkAccess();
}

async function loadData() {
    try {
        const res = await fetch(SCRIPT_URL);
        db = await res.json();
        render();
    } catch(e) { console.log("Load error"); }
}

function render() {
    document.getElementById("monthTxt").innerText = db.month;
    const select = document.getElementById("userSelect");
    select.innerHTML = db.members.map(m => `<option value="${m[0]}">${m[0]} ${m[1]=='Lunas'?'✅':'❌'}</option>`).join("");
    
    // Admin Pay List
    document.getElementById("payList").innerHTML = db.members.map(m => `
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; align-items:center; background:#1e293b; padding:8px; border-radius:8px;">
            <span>${m[0]}</span>
            <button onclick="togglePay('${m[0]}','${m[1]}')" style="background:${m[1]=='Lunas'?'#22c55e':'#ef4444'}; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.75rem;">${m[1].toUpperCase()}</button>
        </div>
    `).join("");

    // Stats
    const total = db.votes.length || 1;
    document.getElementById("statList").innerHTML = db.members.map(m => {
        const vCount = db.votes.filter(v => v[1] === m[0]).length;
        const won = db.members.find(x => x[0] === m[0] && x[2] !== "");
        return `<div style="margin-bottom:12px;">
            <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;">
                <span style="${won?'color:var(--accent); font-weight:bold':''}">${m[0]} ${won?'🏆':''}</span>
                <span>${vCount} Vote</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${(vCount/total)*100}%"></div></div>
        </div>`;
    }).join("");

    // History
    document.getElementById("winTableBody").innerHTML = db.members.filter(m => m[2] !== "").sort((a,b)=>b[2]-a[2]).map(m => 
        `<tr style="border-top: 1px solid #334155;"><td style="padding:10px 0;">Bulan ${m[2]}</td><td style="text-align:right; font-weight:bold; color:var(--accent)">${m[0]}</td></tr>`).join("");

    drawWheel();
}

function checkAccess() {
    const user = document.getElementById("userSelect").value;
    const info = db.members.find(m => m[0] === user);
    const msg = document.getElementById("statusMsg");
    const btn = document.getElementById("voteBtn");

    if (isTimeUp) {
        msg.innerHTML = "🔴 PEMILIHAN SUDAH DITUTUP";
        msg.style.color = "var(--danger)";
        btn.disabled = true;
    } else if (info && info[1] === "Lunas") {
        msg.innerHTML = "🟢 STATUS: LUNAS (HAK VOTE AKTIF)";
        msg.style.color = "var(--success)";
        btn.disabled = false;
    } else {
        msg.innerHTML = "🟡 STATUS: BELUM BAYAR (DIKUNCI)";
        msg.style.color = "var(--accent)";
        btn.disabled = true;
    }
}

function drawWheel() {
    const ctx = document.getElementById("wheel").getContext("2d");
    const names = db.members.map(m => m[0]);
    if(names.length == 0) return;
    const arc = (Math.PI * 2) / names.length;
    const colors = ["#ef4444", "#f59e0b", "#84cc16", "#06b6d4", "#3b82f6", "#a855f7", "#ec4899", "#f97316", "#10b981", "#eab308"];
    
    ctx.clearRect(0,0,500,500);
    names.forEach((m, i) => {
        const startAngle = angle + i * arc - Math.PI/2;
        ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(250, 250);
        ctx.arc(250, 250, 250, startAngle, startAngle + arc); ctx.fill();
        ctx.save(); ctx.translate(250, 250); ctx.rotate(startAngle + arc/2);
        ctx.fillStyle = "white"; ctx.font = "bold 17px Arial"; ctx.textAlign = "right";
        ctx.fillText(m, 235, 8); ctx.restore();
    });
}

function spin(isDemo) {
    if (isSpinning) return;
    isSpinning = true;
    let speed = Math.random() * 0.15 + 0.45;
    function anim() {
        speed *= 0.986; angle += speed; drawWheel();
        if(speed > 0.002) requestAnimationFrame(anim);
        else {
            isSpinning = false;
            const names = db.members.map(m => m[0]);
            // Logic to find winner under pointer
            const index = Math.floor((names.length - (angle % (Math.PI*2)) / ((Math.PI*2)/names.length)) % names.length);
            const res = names[index];
            if(!isDemo) handleVote(res);
            else alert("🔴 HASIL ISENG: " + res);
        }
    }
    anim();
}

async function handleVote(res) {
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'vote', user: document.getElementById("userSelect").value, result: res }) });
    document.getElementById("loader").style.display = "none";
    alert("VOTE BERHASIL MASUK!"); loadData();
}

function loginAdmin() {
    if(prompt("PIN ADMIN:") === "1234") {
        document.getElementById("adminArea").style.display = "block";
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }
}

async function addMember() {
    const n = document.getElementById("newMemberName").value;
    if(!n) return;
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add_member', name: n }) });
    document.getElementById("newMemberName").value = "";
    await loadData(); document.getElementById("loader").style.display = "none";
}

async function togglePay(name, current) {
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'update_pay', name: name, status: current==='Lunas'?'Belum':'Lunas' }) });
    await loadData(); document.getElementById("loader").style.display = "none";
}

async function determineWinner() {
    let win = "";
    const memberCount = db.members.length;
    
    if(db.month == 1) win = "Idam";
    else if(db.month == memberCount) win = "Dewi";
    else {
        let counts = {};
        db.votes.forEach(v => counts[v[1]] = (counts[v[1]] || 0) + 1);
        let sorted = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
        // Anti-Double: Pilih terbanyak yang belum pernah menang
        win = sorted.find(n => {
            const m = db.members.find(x => x[0] === n);
            return m && m[2] === "";
        });
    }

    if(!win) return alert("Belum ada data vote valid / Semua sudah pernah menang.");
    if(!confirm(`Tetapkan ${win} sebagai pemenang bulan ${db.month}?`)) return;

    document.getElementById("loader").style.display = "flex";
    confetti({ particleCount: 300, spread: 100, origin: { y: 0.7 } });
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'set_winner', name: win, month: db.month }) });
    await loadData(); document.getElementById("loader").style.display = "none";
}

setInterval(updateTimer, 1000);
loadData();
</script>
</body>
</html>
