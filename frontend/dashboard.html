<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Dashboard Arisan</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
padding:40px;
}

</style>

</head>

<body>

<h1>Dashboard Arisan</h1>

<p id="namaUser"></p>

<button onclick="logout()">Keluar</button>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

window.location.href="index.html";

}

document.getElementById("namaUser").innerText =
"Selamat datang "+user.nama;

function logout(){

localStorage.removeItem("user");

window.location.href="index.html";

}

</script>

</body>
</html>
