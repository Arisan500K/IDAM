<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISAN BULANAN 500K</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #121212; --glass: rgba(255, 255, 255, 0.05); --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 100vh; margin: 0; }
        .main-card { width: 95%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
        .clock-outer { position: relative; width: 300px; height: 300px; border: 10px solid #333; border-radius: 50%; background: #222; box-shadow: 0 0 30px rgba(0,0,0,0.5); margin: 15px 0; }
        #canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 7s cubic-bezier(0.15, 0, 0.1, 1); }
        .pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 35px; height: 45px; clip-path: polygon(50% 100%, 0 0, 100% 0); background: #ff3e3e; z-index: 100; }
        .btn-container { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .btn-admin { background: linear-gradient(145deg, #ffcc00, #d4ac00); color: #000; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .btn-demo { background: transparent; color: var(--blue); border: 1px solid var(--blue); padding: 10px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .list-section { width: 100%; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; padding: 15px; box-sizing: border-box; }
        .list-header { font-size: 14px; color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .member-list { display: flex; flex-direction: column; gap: 6px; }
        .member-item { padding: 10px; background: var(--glass); border-radius: 8px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .member-item.winner { border-color: rgba(255, 204, 0, 0.3); background: rgba(255, 204, 0, 0.03); color: #888; text-decoration: line-through; }
        .win-tag { font-size: 10px; background: var(--gold); color: black; padding: 2px 8px; border-radius: 4px; font-weight: 800; text-decoration: none !important; }
        footer { margin-top: 30px; padding: 15px; color: #555; font-size: 12px; text-align: center; border-top: 1px solid #222; width: 100%; }
        .btn-reset { background: none; border: none; color: #333; font-size: 10px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2 id="monthTitle" style="color: var(--gold); margin: 15px 0 0 0; font-size: 22px;">ARISAN DIGITAL</h2>
        <div id="statusBadge" style="font-size: 11px; color: #666; margin-bottom: 5px;">Siap untuk diPutar</div>

        <div class="clock-outer">
            <div class="pointer"></div>
            <canvas id="canvas" width="800" height="800"></canvas>
        </div>

        <div class="btn-container">
            <button class="btn-admin" onclick="authAdmin()">🔒 SPIN RESMI (KETUA)</button>
            <button class="btn-demo" onclick="executeDemo()">🎮 COBA PUTAR (DEMO)</button>
        </div>

        <div class="list-section">
            <div class="list-header">RIWAYAT & DAFTAR PESERTA</div>
            <div id="memberContainer" class="member-list"></div>
        </div>

        <button class="btn-reset" onclick="resetDataWithPin()">Reset System</button>
    </div>

    <footer>
        by A. S Daeli &copy; 2026<br>
        Digital Arisan System v2.2 (Chairman First)
    </footer>

<script>
    const KODE_ADMIN = "080522"; 
    const MASTER_NAMES = ["Idam", "Aki", "Daeli", "Ros", "Dewi", "Septi", "Medina", "Agus", "Elis", "Tri"];
    const BULAN_MULAI = "Maret"; // Set bulan pertama arisan

    let winnerData = JSON.parse(localStorage.getItem('arisan_history')) || {};
    let currentRotation = 0;
    let isSpinning = false;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#d35400'];

    function getMonthName() {
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        return months[new Date().getMonth()];
    }

    function init() {
        document.getElementById('monthTitle').innerText = "ARISAN BULAN " + getMonthName().toUpperCase();
        renderMembers();
        drawWheel();
    }

    function renderMembers() {
        const container = document.getElementById('memberContainer');
        container.innerHTML = "";
        MASTER_NAMES.forEach(name => {
            const monthWon = winnerData[name];
            container.innerHTML += `
                <div class="member-item ${monthWon ? 'winner' : ''}">
                    <span>${monthWon ? '✔️' : '⭕'} ${name}</span>
                    ${monthWon ? `<span class="win-tag">${monthWon.toUpperCase()}</span>` : ''}
                </div>`;
        });
    }

    function drawWheel() {
        const winners = Object.keys(winnerData);
        const activeNames = MASTER_NAMES.filter(n => !winners.includes(n));
        
        if (activeNames.length === 0) {
            ctx.clearRect(0, 0, 800, 800);
            ctx.fillStyle = "gray"; ctx.textAlign = "center"; ctx.font = "bold 35px Arial";
            ctx.fillText("SEMUA SUDAH MENANG", 400, 400);
            return;
        }

        const arc = (2 * Math.PI) / activeNames.length;
        ctx.clearRect(0, 0, 800, 800);
        activeNames.forEach((name, i) => {
            const angle = i * arc;
            ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(400, 400);
            ctx.arc(400, 400, 400, angle - Math.PI/2, (angle + arc) - Math.PI/2);
            ctx.fill(); ctx.stroke();
            ctx.save(); ctx.translate(400, 400); ctx.rotate(angle + arc / 2 - Math.PI/2);
            ctx.textAlign = "right"; ctx.fillStyle = "#fff"; ctx.font = "bold 45px Arial";
            ctx.fillText(name, 350, 15); ctx.restore();
        });
    }

    async function authAdmin() {
        if(isSpinning) return;
        const currentMonth = getMonthName();

        // LOGIKA KETUA: Jika ini bulan pertama (Maret) dan Idam belum menang
        if (currentMonth === BULAN_MULAI && !winnerData["Idam"]) {
            const { value: pass } = await Swal.fire({
                title: 'Konfirmasi Ketua',
                text: `Bulan Pertama (${BULAN_MULAI}): Pemenang adalah Ketua (Idam). Masukkan PIN untuk konfirmasi.`,
                input: 'password',
                confirmButtonColor: '#ffcc00'
            });

            if (pass === KODE_ADMIN) {
                winnerData["Idam"] = BULAN_MULAI;
                localStorage.setItem('arisan_history', JSON.stringify(winnerData));
                Swal.fire({
                    title: `🏆 PEMENANG BULAN PERTAMA 🏆`,
                    html: `<h1 style="color:var(--gold)">Idam (Ketua)</h1>`,
                    icon: 'success'
                }).then(() => init());
            } else if (pass) {
                Swal.fire('Error', 'PIN Salah!', 'error');
            }
            return;
        }

        // Cek jika bulan ini sudah ada pemenang
        const existingWinnerThisMonth = Object.keys(winnerData).find(key => winnerData[key] === currentMonth);
        if (existingWinnerThisMonth) {
            Swal.fire({
                title: `Hasil ${currentMonth} Terkunci`,
                html: `Pemenang: <b style="color:var(--gold)">${existingWinnerThisMonth}</b>`,
                icon: 'info'
            });
            return;
        }

        const { value: pass } = await Swal.fire({
            title: 'Verifikasi PIN Admin',
            input: 'password',
            confirmButtonColor: '#ffcc00'
        });

        if (pass === KODE_ADMIN) {
            document.getElementById('statusBadge').innerText = "MODE: RESMI";
            executeSpin(true);
        } else if (pass) {
            Swal.fire('Error', 'PIN Salah!', 'error');
        }
    }

    function executeDemo() {
        if(isSpinning) return;
        document.getElementById('statusBadge').innerText = "MODE: DEMO";
        executeSpin(false);
    }

    function executeSpin(isAdmin) {
        isSpinning = true;
        const winners = Object.keys(winnerData);
        const activeNames = MASTER_NAMES.filter(n => !winners.includes(n));
        const putaranAcak = Math.floor(Math.random() * 360);
        const totalDerajat = (360 * 12) + putaranAcak; 
        currentRotation += totalDerajat;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const stopAngle = currentRotation % 360;
            const sliceSize = 360 / activeNames.length;
            const winningIndex = Math.floor((360 - stopAngle) / sliceSize) % activeNames.length;
            const pemenang = activeNames[winningIndex];

            if (isAdmin) {
                winnerData[pemenang] = getMonthName();
                localStorage.setItem('arisan_history', JSON.stringify(winnerData));
                Swal.fire({ title: `SELAMAT! (${getMonthName()})`, html: `<h1 style="color:var(--gold)">${pemenang}</h1>`, icon: 'success' }).then(() => { isSpinning = false; init(); });
            } else {
                Swal.fire({ title: `HASIL COBA (DEMO)`, html: `<h1 style="color:var(--blue)">${pemenang}</h1>`, icon: 'info' }).then(() => { isSpinning = false; init(); });
            }
        }, 7000);
    }

    async function resetDataWithPin() {
        const { value: pass } = await Swal.fire({ title: 'Hapus Riwayat?', input: 'password' });
        if (pass === KODE_ADMIN) {
            localStorage.clear(); winnerData = {}; init();
            Swal.fire('Bersih!', 'Sistem kembali ke awal.', 'success');
        }
    }

    init();
</script>
</body>
</html>
