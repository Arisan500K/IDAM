<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ARISAN BULANAN Rp500.000</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #fbbf24;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --gold-gradient: linear-gradient(135deg, #fbbf24, #d97706);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #f1f5f9;
            margin: 0; padding: 15px;
            min-height: 100vh;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }

        /* HEADER */
        .main-header { text-align: center; margin-bottom: 25px; padding: 20px 0; }
        .title-gold { 
            font-size: 28px; font-weight: 800; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        /* CARD STYLE */
        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 28px; padding: 24px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* NAVIGATION TABS */
        .nav-tabs {
            display: flex; gap: 5px; background: rgba(0,0,0,0.3);
            padding: 6px; border-radius: 18px; margin-bottom: 25px;
        }
        .tab-item {
            flex: 1; padding: 12px 5px; border: none; background: none;
            color: #94a3b8; font-weight: 700; font-size: 10px;
            cursor: pointer; border-radius: 14px; transition: 0.4s;
            text-transform: uppercase;
        }
        .tab-item.active { background: var(--gold-gradient); color: #000; box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3); }

        /* VISUAL MODES */
        .mode-container { min-height: 320px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* 1. SPIN WHEEL */
        #wheelCanvas { width: 320px; height: 320px; border-radius: 50%; border: 10px solid #334155; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 10; width: 30px; fill: var(--danger); filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        /* 2. BOTTLE SHAKER */
        .bottle-wrapper { display: none; text-align: center; }
        .bottle { width: 120px; transition: 0.1s; cursor: pointer; }
        .shaking { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg) translate(2px, 1px); }
            50% { transform: rotate(5deg) translate(-2px, -1px); }
            100% { transform: rotate(-5deg) translate(1px, 2px); }
        }

        /* 3. DICE/SLOT */
        .dice-wrapper { display: none; perspective: 1000px; }
        .dice {
            width: 100px; height: 100px; background: white; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #1e293b; font-weight: 800;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
        }

        /* UI ELEMENTS */
        .btn-main {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--gold-gradient); color: #000;
            font-weight: 800; font-size: 18px; cursor: pointer;
            transition: 0.3s; margin-top: 20px;
        }
        .btn-main:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-pill { padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .lunas { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .belum { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .admin-btn { font-size: 12px; color: var(--accent); text-align: center; margin-top: 20px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <header class="main-header">
        <div class="title-gold">Elite Arisan V4</div>
        <div id="periodeText" style="opacity: 0.5; font-size: 12px; font-weight: 600; margin-top: 5px;"></div>
    </header>

    <div class="card">
        <div class="nav-tabs">
            <button class="tab-item active" onclick="setMode('spin', this)">🎡 Spin</button>
            <button class="tab-item" onclick="setMode('bottle', this)">🍾 Shaker</button>
            <button class="tab-item" onclick="setMode('dice', this)">🎲 Dice</button>
        </div>

        <div class="mode-container">
            <div id="view-spin">
                <svg class="pointer" viewBox="0 0 100 100"><path d="M50 100 L10 0 L90 0 Z"/></svg>
                <canvas id="wheelCanvas" width="600" height="600"></canvas>
            </div>

            <div id="view-bottle" class="bottle-wrapper">
                <img src="https://cdn-icons-png.flaticon.com/512/3105/3105807.png" id="bottleImg" class="bottle" alt="bottle">
                <p id="bottleStatus" style="margin-top:15px; font-weight:700; color:var(--primary)">KOCOK BOTOLNYA!</p>
            </div>

            <div id="view-dice" class="dice-wrapper">
                <div id="diceBox" class="dice">?</div>
            </div>
        </div>

        <button id="drawBtn" class="btn-main" onclick="startDraw()">MULAI UNDIAN</button>
    </div>

    <div class="card">
        <h3 style="font-size: 16px; margin: 0 0 20px 0; color: var(--accent)">📋 Daftar Anggota & Kas</h3>
        <div id="memberList"></div>
        <div class="admin-btn" onclick="openAdmin()">⚙️ PANEL ADMIN</div>
    </div>

    <div id="resetBtn" style="text-align: center; font-size: 10px; color: #334155; cursor: pointer;">RESET SEMUA DATA</div>
</div>

<script>
    const MEMBERS = ["Idam", "Aki", "Daeli", "Ros", "Dewi", "Septi", "Medina", "Agus", "Elis", "Tri"];
    const COLORS = ["#f87171", "#fb923c", "#fbbf24", "#a3e635", "#34d399", "#22d3ee", "#818cf8", "#c084fc", "#f472b6", "#94a3b8"];
    const ADMIN_PIN = "080522";

    let state = {
        mode: 'spin',
        isRolling: false,
        winners: JSON.parse(localStorage.getItem('v4_winners')) || {},
        payments: JSON.parse(localStorage.getItem('v4_payments')) || {},
        rotation: 0
    };

    function init() {
        const date = new Date();
        document.getElementById('periodeText').innerText = date.toLocaleString('id-ID', { month: 'long', year: 'numeric' }).toUpperCase();
        renderMembers();
        drawWheel();
        
        document.getElementById('resetBtn').onclick = () => {
            if(confirm("Hapus semua data v4?")) { localStorage.clear(); location.reload(); }
        };
    }

    function setMode(m, el) {
        if(state.isRolling) return;
        state.mode = m;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        document.getElementById('view-spin').style.display = m === 'spin' ? 'block' : 'none';
        document.getElementById('view-bottle').style.display = m === 'bottle' ? 'block' : 'none';
        document.getElementById('view-dice').style.display = m === 'dice' ? 'block' : 'none';
        
        if(m === 'spin') drawWheel();
    }

    function drawWheel() {
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const activeMembers = MEMBERS.filter(m => !state.winners[m]);
        const arc = (Math.PI * 2) / activeMembers.length;

        ctx.clearRect(0,0,600,600);
        activeMembers.forEach((name, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = COLORS[i % COLORS.length];
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 280, angle, angle + arc);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle + arc / 2);
            ctx.fillStyle = "#000";
            ctx.font = "bold 24px Plus Jakarta Sans";
            ctx.textAlign = "right";
            ctx.fillText(name, 250, 10);
            ctx.restore();
        });
    }

    async function startDraw() {
        if(state.isRolling) return;
        
        const activeMembers = MEMBERS.filter(m => !state.winners[m]);
        const lunasMembers = activeMembers.filter(m => (state.payments[m] || 0) >= 500000);

        if(lunasMembers.length === 0) {
            return Swal.fire("Oops!", "Tidak ada anggota lunas yang tersisa untuk diundi.", "error");
        }

        // Algoritma Adil: Pilih pemenang dari daftar yang sudah lunas
        const winner = lunasMembers[Math.floor(Math.random() * lunasMembers.length)];
        state.isRolling = true;
        document.getElementById('drawBtn').disabled = true;

        if(state.mode === 'spin') {
            const idx = activeMembers.indexOf(winner);
            const sliceDeg = 360 / activeMembers.length;
            const stopAt = 360 - (idx * sliceDeg) - (sliceDeg / 2);
            state.rotation += (360 * 5) + stopAt;
            document.getElementById('wheelCanvas').style.transform = `rotate(${state.rotation}deg)`;
            setTimeout(() => showWinner(winner), 5500);
        } 
        else if(state.mode === 'bottle') {
            const b = document.getElementById('bottleImg');
            b.classList.add('shaking');
            setTimeout(() => {
                b.classList.remove('shaking');
                showWinner(winner);
            }, 3000);
        }
        else {
            let count = 0;
            const dice = document.getElementById('diceBox');
            let interval = setInterval(() => {
                dice.innerText = MEMBERS[Math.floor(Math.random() * MEMBERS.length)].substring(0,1);
                count++;
                if(count > 20) {
                    clearInterval(interval);
                    dice.innerText = winner.substring(0,1);
                    showWinner(winner);
                }
            }, 100);
        }
    }

    function showWinner(name) {
        state.isRolling = false;
        document.getElementById('drawBtn').disabled = false;
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: COLORS });
        
        Swal.fire({
            title: 'SELAMAT!',
            html: `Pemenang Periode Ini:<br><h1 style="color:var(--primary)">${name}</h1>`,
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#fbbf24',
            confirmButtonText: 'CATAT KEMENANGAN'
        }).then(() => {
            state.winners[name] = new Date().toLocaleDateString();
            save();
            renderMembers();
            if(state.mode === 'spin') drawWheel();
        });
    }

    function renderMembers() {
        let html = "";
        MEMBERS.forEach(m => {
            const total = state.payments[m] || 0;
            const isLunas = total >= 500000;
            const hasWon = !!state.winners[m];

            html += `
                <div class="member-item" style="${hasWon ? 'opacity:0.4' : ''}">
                    <div>
                        <div style="font-weight:700">${hasWon ? '🏆 ' : ''}${m}</div>
                        <div style="font-size:11px; opacity:0.6">Kas: Rp ${total.toLocaleString()}</div>
                    </div>
                    <div class="status-pill ${isLunas ? 'lunas' : 'belum'}">
                        ${hasWon ? 'SUDAH DAPAT' : (isLunas ? 'LUNAS' : 'BELUM BAYAR')}
                    </div>
                </div>`;
        });
        document.getElementById('memberList').innerHTML = html;
    }

    async function openAdmin() {
        const { value: pin } = await Swal.fire({ title: 'PIN ADMIN', input: 'password', background: '#1e293b', color: '#fff' });
        if(pin !== ADMIN_PIN) return;

        let inputs = `<div style="text-align:left; max-height:400px; overflow-y:auto">`;
        MEMBERS.forEach(m => {
            inputs += `<div style="margin-bottom:15px">
                <label style="font-size:12px; color:var(--primary)">${m}</label>
                <input type="number" id="pay-${m}" value="${state.payments[m] || 0}" style="width:100%; padding:12px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:#fff; margin-top:5px">
            </div>`;
        });
        inputs += `</div>`;

        const { value: formValues } = await Swal.fire({
            title: 'Update Kas Anggota',
            html: inputs,
            focusConfirm: false,
            background: '#1e293b', color: '#fff',
            preConfirm: () => {
                let res = {};
                MEMBERS.forEach(m => res[m] = parseInt(document.getElementById(`pay-${m}`).value) || 0);
                return res;
            }
        });

        if(formValues) {
            state.payments = formValues;
            save();
            renderMembers();
        }
    }

    function save() {
        localStorage.setItem('v4_winners', JSON.stringify(state.winners));
        localStorage.setItem('v4_payments', JSON.stringify(state.payments));
    }

    init();
</script>
</body>
</html>
