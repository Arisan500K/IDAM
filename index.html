<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arisan Jam Raksasa - Admin Only</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-color: #2c3e50; --gold: #f1c40f; }
        body { font-family: 'Courier New', Courier, monospace; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Desain Jam Dinding Raksasa */
        .clock-container { position: relative; width: 350px; height: 350px; border: 15px solid #333; border-radius: 50%; background: #fff; box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.2); margin-bottom: 30px; }
        
        #canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 7s cubic-bezier(0.15, 0, 0.15, 1); }

        /* Jarum Jam Penunjuk (Pointer) */
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 40px; height: 50px; clip-path: polygon(50% 100%, 0 0, 100% 0); background: #e74c3c; z-index: 100; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }

        .admin-box { background: #333; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        button { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; box-shadow: 0 4px 0 #b7950b; }
        button:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold); text-shadow: 2px 2px #000;">🕒 JAM ARISAN RAKSASA</h1>

    <div class="clock-container">
        <div class="pointer" id="pointer"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <div class="admin-box">
        <p style="margin: 0 0 10px 0; font-size: 14px; color: #aaa;">Daftar Peserta (Pisahkan Baris):</p>
        <textarea id="names" oninput="drawWheel()">Budi&#10;Ani&#10;Siti&#10;Iwan&#10;Dewi&#10;Rudi&#10;Lina</textarea>
        <button onclick="validasiAdmin()">PUTAR RODA (KODE ADMIN)</button>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('names');
    const KODE_RAHASIA = "1234"; // GANTI KODE ANDA DI SINI

    let currentRotation = 0;
    const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#34495e'];

    function drawWheel() {
        const names = nameInput.value.split('\n').filter(n => n.trim() !== "");
        if (names.length === 0) return;

        const arc = (2 * Math.PI) / names.length;
        ctx.clearRect(0, 0, 500, 500);

        names.forEach((name, i) => {
            const angle = i * arc;
            ctx.fillStyle = colors[i % colors.length];
            
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 245, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = (colors[i % colors.length] === '#f1c40f') ? "#000" : "#fff";
            ctx.font = "bold 22px Arial";
            ctx.fillText(name, 230, 10);
            ctx.restore();
        });
    }

    async function validasiAdmin() {
        const { value: password } = await Swal.fire({
            title: 'Otoritas Admin',
            input: 'password',
            inputLabel: 'Masukkan Kode Akses untuk Mengocok',
            inputPlaceholder: 'Kode Rahasia...',
            inputAttributes: { autocapitalize: 'off', autocorrect: 'off' }
        });

        if (password === KODE_RAHASIA) {
            putarRoda();
        } else if (password) {
            Swal.fire('Salah!', 'Kode salah, anda bukan admin!', 'error');
        }
    }

    function putarRoda() {
        const names = nameInput.value.split('\n').filter(n => n.trim() !== "");
        if (names.length < 2) return;

        // Tambah putaran (7 detik putaran)
        const putaranEkstra = Math.floor(Math.random() * 360) + (360 * 10); 
        currentRotation += putaranEkstra;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const actualDeg = currentRotation % 360;
            const arc = 360 / names.length;
            const index = Math.floor((360 - (actualDeg % 360)) / arc) % names.length;
            const pemenang = names[index];

            Swal.fire({
                title: '🎉 HASIL KOCOKAN 🎉',
                html: `<p style="font-size:20px">Selamat kepada:</p><h1 style="color:#e74c3c; font-size:45px">${pemenang}</h1>`,
                icon: 'success',
                confirmButtonText: 'Alhamdulillah'
            });
        }, 7000); // 7 Detik sesuai CSS
    }

    drawWheel();
</script>

</body>
</html>
