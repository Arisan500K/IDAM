<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ARISAN BULANAN Rp500.000</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #fbbf24;
            --primary-dark: #d97706;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --gold-gradient: linear-gradient(135deg, #fbbf24, #d97706);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            margin: 0; padding: 20px;
            min-height: 100vh;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }

        /* HEADER */
        .main-header { text-align: center; margin-bottom: 30px; }
        .title-gold { 
            font-size: 24px; font-weight: 800; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 2px;
            margin: 0; line-height: 1.2;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        /* CARD STYLE */
        .card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border-radius: 32px; padding: 24px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* TABS */
        .nav-tabs {
            display: flex; gap: 8px; background: rgba(0,0,0,0.4);
            padding: 8px; border-radius: 20px; margin-bottom: 25px;
        }
        .tab-item {
            flex: 1; padding: 12px 5px; border: none; background: none;
            color: #94a3b8; font-weight: 700; font-size: 11px;
            cursor: pointer; border-radius: 15px; transition: 0.3s;
            text-transform: uppercase;
        }
        .tab-item.active { background: var(--gold-gradient); color: #000; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); }

        /* UNDIAN VISUAL */
        .mode-container { min-height: 340px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        
        #wheelCanvas { width: 320px; height: 320px; border-radius: 50%; border: 8px solid #334155; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; width: 35px; fill: var(--danger); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

        .bottle-wrapper { display: none; text-align: center; }
        .bottle { width: 110px; cursor: pointer; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
        
        .dice-wrapper { display: none; }
        .dice {
            width: 120px; height: 120px; background: #fff; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: #0f172a; font-weight: 800;
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.1), 0 15px 30px rgba(0,0,0,0.4);
        }

        @keyframes shake {
            0% { transform: rotate(0) translate(0); }
            25% { transform: rotate(10deg) translate(5px); }
            75% { transform: rotate(-10deg) translate(-5px); }
            100% { transform: rotate(0) translate(0); }
        }
        .shaking { animation: shake 0.15s infinite; }

        /* BUTTONS */
        .btn-main {
            width: 100%; padding: 22px; border-radius: 22px; border: none;
            background: var(--gold-gradient); color: #000;
            font-weight: 800; font-size: 18px; cursor: pointer;
            transition: 0.3s; margin-top: 15px; box-shadow: 0 10px 20px -5px rgba(217, 119, 6, 0.4);
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; }

        /* LISTS */
        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; background: rgba(255,255,255,0.03);
            border-radius: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .status-pill { padding: 6px 12px; border-radius: 10px; font-size: 9px; font-weight: 800; }
        .lunas { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .belum { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .winner-tag { background: var(--gold-gradient); color: #000; }

        .admin-controls { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .admin-link { font-size: 12px; color: var(--accent); cursor: pointer; opacity: 0.7; text-decoration: none; font-weight: 600; }
        .admin-link.danger { color: var(--danger); }
        
        /* SCROLLBAR */
        #memberList { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        #memberList::-webkit-scrollbar { width: 4px; }
        #memberList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header class="main-header">
        <h1 class="title-gold">ARISAN BULANAN<br>Rp500.000</h1>
        <p id="periodeDisplay" style="margin-top:8px; font-size:13px; color:var(--accent); font-weight:700; letter-spacing:1px"></p>
    </header>

    <div class="card">
        <div class="nav-tabs">
            <button class="tab-item active" onclick="setMode('spin', this)">🎡 Roda</button>
            <button class="tab-item" onclick="setMode('bottle', this)">🍾 Kocok</button>
            <button class="tab-item" onclick="setMode('dice', this)">🎲 Acak</button>
        </div>

        <div class="mode-container">
            <div id="view-spin">
                <svg class="pointer" viewBox="0 0 100 100"><path d="M50 100 L10 0 L90 0 Z"/></svg>
                <canvas id="wheelCanvas" width="600" height="600"></canvas>
            </div>

            <div id="view-bottle" class="bottle-wrapper">
                <img src="https://cdn-icons-png.flaticon.com/512/3105/3105807.png" id="bottleImg" class="bottle" alt="bottle">
                <p id="bottleStatus" style="margin-top:20px; font-weight:700; color:var(--primary); letter-spacing:1px">SIAP DIKOCOK!</p>
            </div>

            <div id="view-dice" class="dice-wrapper">
                <div id="diceBox" class="dice">?</div>
            </div>
        </div>

        <button id="drawBtn" class="btn-main" onclick="startDraw()">UNDI PEMENANG</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h3 style="margin:0; font-size:16px; color:#fff">Status Anggota</h3>
            <span id="totalMembers" style="font-size:12px; color:var(--accent)"></span>
        </div>
        <div id="memberList"></div>
        
        <div class="admin-controls">
            <span class="admin-link" onclick="openAdmin()">⚙️ PANEL ADMIN</span>
            <span class="admin-link danger" onclick="secureReset()">♻️ RESET SISTEM</span>
        </div>
    </div>
</div>

<script>
    // Konfigurasi Default
    const DEFAULT_MEMBERS = ["Idam", "Aki", "Daeli", "Ros", "Dewi", "Septi", "Medina", "Agus", "Elis", "Tri"];
    const COLORS = ["#f87171", "#fb923c", "#fbbf24", "#a3e635", "#34d399", "#22d3ee", "#818cf8", "#c084fc", "#f472b6", "#94a3b8"];
    const ADMIN_PIN = "080522";

    let state = {
        mode: 'spin',
        isRolling: false,
        members: JSON.parse(localStorage.getItem('arisan_members')) || DEFAULT_MEMBERS,
        winners: JSON.parse(localStorage.getItem('arisan_winners')) || {},
        payments: JSON.parse(localStorage.getItem('arisan_payments')) || {},
        rotation: 0
    };

    function init() {
        const d = new Date();
        document.getElementById('periodeDisplay').innerText = d.toLocaleString('id-ID', { month: 'long', year: 'numeric' }).toUpperCase();
        renderMembers();
        drawWheel();
    }

    function setMode(m, el) {
        if(state.isRolling) return;
        state.mode = m;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        ['view-spin', 'view-bottle', 'view-dice'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById(`view-${m}`).style.display = (m === 'spin') ? 'block' : (m === 'bottle' ? 'block' : 'flex');
        
        if(m === 'spin') drawWheel();
    }

    function drawWheel() {
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const activeMembers = state.members.filter(m => !state.winners[m]);
        
        if(activeMembers.length === 0) return;
        
        const arc = (Math.PI * 2) / activeMembers.length;
        ctx.clearRect(0,0,600,600);

        activeMembers.forEach((name, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = COLORS[i % COLORS.length];
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 280, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "rgba(15, 23, 42, 0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle + arc / 2);
            ctx.fillStyle = "#0f172a";
            ctx.font = "bold 22px Plus Jakarta Sans";
            ctx.textAlign = "right";
            ctx.fillText(name.toUpperCase(), 250, 8);
            ctx.restore();
        });
    }

    async function startDraw() {
        if(state.isRolling) return;
        
        const activeMembers = state.members.filter(m => !state.winners[m]);
        const lunasMembers = activeMembers.filter(m => (state.payments[m] || 0) >= 500000);

        if(activeMembers.length === 0) return Swal.fire("Selesai!", "Semua anggota sudah memenangkan arisan.", "info");
        if(lunasMembers.length === 0) return Swal.fire("Perhatian", "Tidak ada anggota yang sudah lunas (Rp500rb) untuk diundi.", "warning");

        const winner = lunasMembers[Math.floor(Math.random() * lunasMembers.length)];
        state.isRolling = true;
        document.getElementById('drawBtn').disabled = true;

        if(state.mode === 'spin') {
            const idx = activeMembers.indexOf(winner);
            const sliceDeg = 360 / activeMembers.length;
            const stopAt = 360 - (idx * sliceDeg) - (sliceDeg / 2);
            state.rotation += (360 * 5) + stopAt;
            document.getElementById('wheelCanvas').style.transform = `rotate(${state.rotation}deg)`;
            setTimeout(() => showWinner(winner), 5500);
        } 
        else if(state.mode === 'bottle') {
            const b = document.getElementById('bottleImg');
            b.classList.add('shaking');
            setTimeout(() => { b.classList.remove('shaking'); showWinner(winner); }, 3000);
        }
        else {
            let count = 0;
            const dice = document.getElementById('diceBox');
            let interval = setInterval(() => {
                dice.innerText = state.members[Math.floor(Math.random() * state.members.length)].substring(0,1);
                count++;
                if(count > 25) { clearInterval(interval); dice.innerText = winner.substring(0,1); showWinner(winner); }
            }, 80);
        }
    }

    function showWinner(name) {
        state.isRolling = false;
        document.getElementById('drawBtn').disabled = false;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#ffffff'] });
        
        Swal.fire({
            title: 'SELAMAT!',
            html: `Pemenang Arisan:<br><h2 style="color:var(--primary); font-size:32px">${name}</h2>`,
            background: '#1e293b', color: '#fff',
            confirmButtonColor: '#fbbf24', confirmButtonText: 'SAHKAN KEMENANGAN'
        }).then(() => {
            state.winners[name] = new Date().toLocaleDateString('id-ID');
            save();
            renderMembers();
            if(state.mode === 'spin') drawWheel();
        });
    }

    function renderMembers() {
        let html = "";
        state.members.forEach(m => {
            const total = state.payments[m] || 0;
            const isLunas = total >= 500000;
            const hasWon = !!state.winners[m];

            html += `
                <div class="member-item" style="${hasWon ? 'border:1px solid var(--primary); background:rgba(251,191,36,0.05)' : ''}">
                    <div>
                        <div style="font-weight:700; font-size:15px">${hasWon ? '🏆 ' : ''}${m}</div>
                        <div style="font-size:11px; opacity:0.6; margin-top:4px">KAS: Rp ${total.toLocaleString('id-ID')}</div>
                    </div>
                    <div class="status-pill ${hasWon ? 'winner-tag' : (isLunas ? 'lunas' : 'belum')}">
                        ${hasWon ? 'PEMENANG' : (isLunas ? 'LUNAS' : 'BELUM BAYAR')}
                    </div>
                </div>`;
        });
        document.getElementById('memberList').innerHTML = html;
        document.getElementById('totalMembers').innerText = `${state.members.length} Orang`;
    }

    async function openAdmin() {
        const { value: pin } = await Swal.fire({ title: 'PIN ADMIN', input: 'password', background: '#1e293b', color: '#fff' });
        if(pin !== ADMIN_PIN) return;

        let inputs = `<div style="text-align:left; max-height:400px; overflow-y:auto; padding:10px">`;
        state.members.forEach(m => {
            inputs += `<div style="margin-bottom:15px">
                <label style="font-size:12px; color:var(--primary); font-weight:700">${m}</label>
                <div style="display:flex; gap:10px; margin-top:5px">
                    <input type="number" id="pay-${m}" value="${state.payments[m] || 0}" style="flex:1; padding:10px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#fff">
                    <button onclick="removeMember('${m}')" style="background:var(--danger); border:none; border-radius:8px; color:#fff; padding:0 10px; cursor:pointer">×</button>
                </div>
            </div>`;
        });
        inputs += `<input type="text" id="newName" placeholder="+ Nama Baru" style="width:100%; padding:12px; border-radius:8px; border:1px dashed var(--accent); background:transparent; color:#fff; margin-top:10px"></div>`;

        const { value: formValues } = await Swal.fire({
            title: 'Pengaturan Anggota',
            html: inputs,
            background: '#1e293b', color: '#fff',
            showCancelButton: true,
            confirmButtonText: 'SIMPAN PERUBAHAN',
            preConfirm: () => {
                let newPayments = {};
                state.members.forEach(m => newPayments[m] = parseInt(document.getElementById(`pay-${m}`).value) || 0);
                let newName = document.getElementById('newName').value.trim();
                return { newPayments, newName };
            }
        });

        if(formValues) {
            state.payments = formValues.newPayments;
            if(formValues.newName) state.members.push(formValues.newName);
            save();
            renderMembers();
            drawWheel();
        }
    }

    function removeMember(name) {
        if(confirm(`Hapus ${name} dari daftar?`)) {
            state.members = state.members.filter(m => m !== name);
            delete state.payments[name];
            delete state.winners[name];
            save();
            Swal.close();
            renderMembers();
            drawWheel();
        }
    }

    async function secureReset() {
        const { value: pin } = await Swal.fire({ 
            title: 'KONFIRMASI RESET', 
            text: 'Semua data kas dan pemenang akan dihapus!',
            input: 'password', 
            inputPlaceholder: 'Masukkan PIN Admin',
            background: '#1e293b', color: '#fff',
            confirmButtonColor: var(--danger)
        });

        if(pin === ADMIN_PIN) {
            localStorage.clear();
            location.reload();
        } else if(pin) {
            Swal.fire("Gagal", "PIN Salah!", "error");
        }
    }

    function save() {
        localStorage.setItem('arisan_members', JSON.stringify(state.members));
        localStorage.setItem('arisan_winners', JSON.stringify(state.winners));
        localStorage.setItem('arisan_payments', JSON.stringify(state.payments));
    }

    init();
</script>
</body>
</html>
