<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ARISAN BULANAN 500K</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<h1>ARISAN BULANAN 500K</h1>
<div class="subtitle">Ketua: Idam</div>

<div id="bulan"></div>

<div class="card">

<h3>Mode Spin</h3>

<div class="spinModes">

<button onclick="setMode('wheel')" class="modeWheel">🎡 Wheel</button>
<button onclick="setMode('dice')" class="modeDice">🎲 Dadu</button>
<button onclick="setMode('cup')" class="modeCup">🥤 Gelas</button>

</div>

<div id="spinVisual">🎡</div>

<button class="spinBtn" onclick="startSpin()">SPIN</button>

<div id="progress"></div>

</div>

<div class="card">

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

</div>

<div class="card">

<h3>Statistik Voting</h3>
<div id="stat"></div>

</div>

<div class="card">

<h3>Riwayat Spin</h3>
<div id="history"></div>

</div>

<div class="card">

<h3>Pemenang Bulan Ini</h3>
<div id="winner"></div>

</div>

<div class="card">

<h3>Daftar Peserta</h3>
<div id="members"></div>

</div>

<div class="card">

<h3>Pembayaran Bulan Ini</h3>
<div id="payment"></div>
<button onclick="adminMode()">Edit Pembayaran</button>

</div>

<button onclick="resetSystem()" class="resetBtn">Reset Sistem</button>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/spinModes.js"></script>
<script src="js/wheel.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>

</body>

</html>
