<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arisan Bulanan 500K</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #121212; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        .clock-outer { position: relative; width: 340px; height: 340px; border: 12px solid #333; border-radius: 50%; background: #222; box-shadow: 0 0 40px rgba(0,0,0,0.8); margin: 20px 0; }
        #canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 8s cubic-bezier(0.15, 0, 0.1, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 40px; height: 50px; clip-path: polygon(50% 100%, 0 0, 100% 0); background: #ff3e3e; z-index: 100; }

        .panel { background: #1e1e1e; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #333; }
        .member-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; text-align: left; }
        .member-item { padding: 8px; background: var(--glass); border-radius: 8px; font-size: 14px; display: flex; align-items: center; }
        .member-item.winner { text-decoration: line-through; color: #666; background: rgba(255,0,0,0.1); }
        .member-item input { margin-right: 10px; }

        button { background: linear-gradient(145deg, #ffcc00, #d4ac00); color: #000; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .btn-reset { background: #444; color: #ccc; margin-top: 10px; padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

    <h2 id="monthTitle" style="color: var(--gold); margin-bottom: 5px;">Arisan Bulan ...</h2>
    
    <div class="clock-outer">
        <div class="pointer"></div>
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <div class="panel">
        <div id="memberContainer" class="member-list"></div>
        <button onclick="authAdmin()">KOCOK PEMENANG</button>
        <button class="btn-reset" onclick="resetData()">Reset Semua Data Pemenang</button>
    </div>

<script>
    const KODE_ADMIN = "1234"; 
    const MASTER_NAMES = ["Idam", "Aki", "Daeli", "Ros", "Dewi", "Septi", "medina", "Agus", "Elis", "Tri"];
    
    let winners = JSON.parse(localStorage.getItem('arisan_winners')) || [];
    let currentRotation = 0;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71', '#d35400'];

    function getMonthName() {
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const d = new Date();
        return months[d.getMonth()];
    }

    function init() {
        document.getElementById('monthTitle').innerText = "Arisan Bulan " + getMonthName();
        renderMembers();
        drawWheel();
    }

    function renderMembers() {
        const container = document.getElementById('memberContainer');
        container.innerHTML = "";
        MASTER_NAMES.forEach(name => {
            const isWinner = winners.includes(name);
            container.innerHTML += `
                <div class="member-item ${isWinner ? 'winner' : ''}">
                    <input type="checkbox" ${isWinner ? 'checked' : ''} disabled> ${name}
                </div>`;
        });
    }

    function drawWheel() {
        const activeNames = MASTER_NAMES.filter(n => !winners.includes(n));
        if (activeNames.length === 0) {
            ctx.clearRect(0, 0, 800, 800);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "30px Arial";
            ctx.fillText("Semua Sudah Menang!", 400, 400);
            return;
        }

        const arc = (2 * Math.PI) / activeNames.length;
        ctx.clearRect(0, 0, 800, 800);

        activeNames.forEach((name, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(400, 400);
            ctx.arc(400, 400, 400, angle - Math.PI/2, (angle + arc) - Math.PI/2);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(400, 400);
            ctx.rotate(angle + arc / 2 - Math.PI/2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 40px Arial";
            ctx.fillText(name, 350, 15);
            ctx.restore();
        });
    }

    async function authAdmin() {
        const activeNames = MASTER_NAMES.filter(n => !winners.includes(n));
        if (activeNames.length === 0) return Swal.fire("Habis!", "Semua peserta sudah menang.", "info");

        const { value: pass } = await Swal.fire({
            title: 'Admin Only',
            input: 'password',
            inputPlaceholder: 'Kode Admin'
        });

        if (pass === KODE_ADMIN) {
            putarRoda(activeNames);
        } else if (pass) {
            Swal.fire('Salah!', '', 'error');
        }
    }

    function putarRoda(activeNames) {
        const putaranAcak = Math.floor(Math.random() * 360);
        const totalDerajat = (360 * 10) + putaranAcak; 
        currentRotation += totalDerajat;

        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const stopAngle = currentRotation % 360;
            const sliceSize = 360 / activeNames.length;
            const winningIndex = Math.floor((360 - stopAngle) / sliceSize) % activeNames.length;
            const pemenang = activeNames[winningIndex];

            // Simpan pemenang
            winners.push(pemenang);
            localStorage.setItem('arisan_winners', JSON.stringify(winners));

            Swal.fire({
                title: `Pemenang Arisan Bulan ${getMonthName()}`,
                html: `<h1 style="color:#ffcc00">${pemenang}</h1>`,
                icon: 'success'
            }).then(() => {
                init(); // Refresh tampilan
            });
        }, 8000);
    }

    function resetData() {
        Swal.fire({
            title: 'Reset Data?',
            text: "Semua riwayat pemenang akan dihapus!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, Reset!'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.clear();
                winners = [];
                init();
            }
        });
    }

    init();
</script>
</body>
</html>
