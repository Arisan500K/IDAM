<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ARISAN BULANAN Rp500.000</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #fbbf24;
            --gold-grad: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --danger: #f87171;
            --success: #4ade80;
        }

        * { box-sizing: border-box; outline: none; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #020617);
            color: #f1f5f9;
            margin: 0; padding: 20px;
            min-height: 100vh;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 480px; }

        /* HEADER */
        .main-header { text-align: center; margin-bottom: 30px; animation: fadeInDown 0.8s ease; }
        .title-gold { 
            font-size: 26px; font-weight: 800; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 2px;
            margin: 0; text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        /* CARD */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        /* NAVIGATION */
        .nav-tabs {
            display: flex; gap: 8px; background: rgba(0,0,0,0.3);
            padding: 6px; border-radius: 20px; margin-bottom: 25px;
        }
        .tab-item {
            flex: 1; padding: 12px 5px; border: none; background: none;
            color: #64748b; font-weight: 700; font-size: 11px;
            cursor: pointer; border-radius: 16px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }
        .tab-item.active { background: var(--gold-grad); color: #000; box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.4); }

        /* MODES VISUAL */
        .mode-container { min-height: 350px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* 1. Spin */
        #view-spin { position: relative; width: 320px; height: 320px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 10px solid #1e293b; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; width: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

        /* 2. Bottle */
        .bottle-wrapper { display: none; flex-direction: column; align-items: center; }
        .bottle { width: 120px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); transition: 0.3s; }
        .shaking { animation: ultraShake 0.1s infinite; }

        /* 3. Dice */
        .dice-wrapper { display: none; }
        .dice-box {
            width: 140px; height: 140px; background: #fff; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; color: #0f172a; font-weight: 800;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1), 0 20px 40px rgba(0,0,0,0.5);
        }

        /* BUTTONS */
        .btn-main {
            width: 100%; padding: 22px; border-radius: 22px; border: none;
            background: var(--gold-grad); color: #000;
            font-weight: 800; font-size: 16px; cursor: pointer;
            transition: 0.4s; box-shadow: 0 15px 30px -10px rgba(217, 119, 6, 0.5);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 20px 35px -10px rgba(217, 119, 6, 0.6); }
        .btn-main:active { transform: translateY(0); }
        .btn-main:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; transform: none; }

        /* LISTS */
        .list-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; font-weight: 700; color: #94a3b8; }
        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px; background: rgba(255,255,255,0.03);
            border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .member-item:hover { background: rgba(255,255,255,0.06); }
        .status-badge { padding: 6px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .lunas { background: rgba(74, 222, 128, 0.1); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.2); }
        .belum { background: rgba(248, 113, 113, 0.1); color: var(--danger); border: 1px solid rgba(248, 113, 113, 0.2); }
        .sudah-dapat { background: var(--gold-grad); color: #000; box-shadow: 0 4px 10px rgba(251, 191, 36, 0.3); }

        .admin-footer { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .admin-link { color: #64748b; font-size: 12px; cursor: pointer; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .admin-link:hover { color: var(--primary); }

        /* ANIMATIONS */
        @keyframes ultraShake {
            0% { transform: rotate(0) translate(2px, 2px); }
            50% { transform: rotate(10deg) translate(-2px, -2px); }
            100% { transform: rotate(-10deg) translate(2px, -2px); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="main-header">
        <h1 class="title-gold">Elite Arisan</h1>
        <div id="dateText" style="opacity: 0.6; font-size: 14px; margin-top: 5px; font-weight: 600;"></div>
    </header>

    <div class="card">
        <div class="nav-tabs">
            <button class="tab-item active" onclick="setMode('spin', this)">🎡 Roda</button>
            <button class="tab-item" onclick="setMode('bottle', this)">🍾 Botol</button>
            <button class="tab-item" onclick="setMode('dice', this)">🎲 Dadu</button>
        </div>

        <div class="mode-container">
            <div id="view-spin">
                <svg class="pointer" viewBox="0 0 100 100">
                    <path d="M50 100 L10 0 L90 0 Z" fill="#ef4444"/>
                </svg>
                <canvas id="wheelCanvas" width="600" height="600"></canvas>
            </div>

            <div id="view-bottle" class="bottle-wrapper">
                <img src="https://cdn-icons-png.flaticon.com/512/3105/3105807.png" id="bottleImg" class="bottle">
                <p id="bottleMsg" style="margin-top:20px; font-weight:800; color:var(--primary); letter-spacing:1px">SIAP DIKOCOK</p>
            </div>

            <div id="view-dice" class="dice-wrapper">
                <div id="diceBox" class="dice-box">?</div>
            </div>
        </div>

        <button id="drawBtn" class="btn-main" onclick="startDraw()">MULAI UNDIAN</button>
    </div>

    <div class="card">
        <div class="list-header">
            <span>DAFTAR ANGGOTA</span>
            <span id="memberCount" style="color: var(--primary);">0</span>
        </div>
        <div id="memberList" style="max-height: 350px; overflow-y: auto;"></div>
        
        <div class="admin-footer">
            <span class="admin-link" onclick="openAdmin()">⚙️ PANEL ADMIN</span>
            <span class="admin-link" onclick="secureReset()" style="color: #ef4444;">♻️ RESET DATA</span>
        </div>
    </div>
</div>

<script>
    const COLORS = ["#fbbf24", "#38bdf8", "#f472b6", "#a78bfa", "#4ade80", "#fb7185", "#2dd4bf", "#fb923c", "#818cf8", "#94a3b8"];
    const ADMIN_PIN = "080522";

    let state = {
        mode: 'spin',
        isRolling: false,
        members: JSON.parse(localStorage.getItem('arisan_v5_names')) || ["Idam", "Aki", "Daeli", "Ros", "Dewi", "Septi", "Medina", "Agus", "Elis", "Tri"],
        winners: JSON.parse(localStorage.getItem('arisan_v5_winners')) || {}, // Format: { "Nama": "Maret 2026" }
        payments: JSON.parse(localStorage.getItem('arisan_v5_pay')) || {},
        rotation: 0
    };

    function init() {
        const now = new Date();
        const curMonth = now.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
        document.getElementById('dateText').innerText = curMonth.toUpperCase();
        
        renderMembers();
        drawWheel();
        checkMonthlyStatus();
    }

    // --- LOGIKA KEADILAN: CEK STATUS BULANAN ---
    function checkMonthlyStatus() {
        const curMonth = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
        let winnerFound = null;

        for (let name in state.winners) {
            if (state.winners[name] === curMonth) {
                winnerFound = name;
                break;
            }
        }

        const btn = document.getElementById('drawBtn');
        if (winnerFound) {
            btn.innerText = `PEMENANG: ${winnerFound}`;
            btn.disabled = true;
            btn.style.background = "linear-gradient(135deg, #1e293b, #334155)";
            btn.style.color = "#94a3b8";
        } else {
            btn.innerText = "MULAI UNDIAN";
            btn.disabled = false;
        }
        return winnerFound;
    }

    function setMode(m, el) {
        if(state.isRolling) return;
        state.mode = m;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        document.getElementById('view-spin').style.display = m === 'spin' ? 'block' : 'none';
        document.getElementById('view-bottle').style.display = m === 'bottle' ? 'flex' : 'none';
        document.getElementById('view-dice').style.display = m === 'dice' ? 'flex' : 'none';
        if(m === 'spin') drawWheel();
    }

    function drawWheel() {
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const active = state.members.filter(m => !state.winners[m]);
        if(active.length === 0) return;

        const arc = (Math.PI * 2) / active.length;
        ctx.clearRect(0,0,600,600);

        active.forEach((name, i) => {
            const angle = i * arc;
            ctx.beginPath();
            ctx.fillStyle = COLORS[i % COLORS.length];
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 280, angle, angle + arc);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle + arc / 2);
            ctx.fillStyle = "#000";
            ctx.font = "bold 24px Plus Jakarta Sans";
            ctx.textAlign = "right";
            ctx.fillText(name.toUpperCase(), 250, 10);
            ctx.restore();
        });
    }

    async function startDraw() {
        if(state.isRolling) return;
        
        // Cek lagi apakah bulan ini sudah ada pemenang di storage
        if(checkMonthlyStatus()) return;

        const active = state.members.filter(m => !state.winners[m]);
        const lunas = active.filter(m => (state.payments[m] || 0) >= 500000);

        if(lunas.length === 0) {
            return Swal.fire("Oops!", "Belum ada anggota lunas (Rp500.000) yang tersisa.", "error");
        }

        // TENTUKAN PEMENANG SECARA ADIL SEBELUM ANIMASI
        const winner = lunas[Math.floor(Math.random() * lunas.length)];
        state.isRolling = true;
        document.getElementById('drawBtn').disabled = true;

        if(state.mode === 'spin') {
            const idx = active.indexOf(winner);
            const sliceDeg = 360 / active.length;
            const stopAt = 360 - (idx * sliceDeg) - (sliceDeg / 2);
            state.rotation += (360 * 5) + stopAt;
            document.getElementById('wheelCanvas').style.transform = `rotate(${state.rotation}deg)`;
            setTimeout(() => finalizeWinner(winner), 5500);
        } 
        else if(state.mode === 'bottle') {
            document.getElementById('bottleImg').classList.add('shaking');
            document.getElementById('bottleMsg').innerText = "MENGOCOK...";
            setTimeout(() => {
                document.getElementById('bottleImg').classList.remove('shaking');
                finalizeWinner(winner);
            }, 3000);
        }
        else {
            let count = 0;
            const dice = document.getElementById('diceBox');
            let interval = setInterval(() => {
                dice.innerText = active[Math.floor(Math.random() * active.length)].substring(0,1);
                count++;
                if(count > 20) {
                    clearInterval(interval);
                    dice.innerText = winner.substring(0,1);
                    finalizeWinner(winner);
                }
            }, 100);
        }
    }

    function finalizeWinner(name) {
        state.isRolling = false;
        const curMonth = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
        
        // LOCK DATA
        state.winners[name] = curMonth;
        save();
        
        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#fbbf24', '#ffffff'] });
        
        Swal.fire({
            title: 'SELAMAT!',
            html: `<p style="margin-bottom:0">Pemenang Periode Ini:</p><h1 style="color:var(--primary); font-size:40px; margin-top:10px">${name}</h1>`,
            background: '#1e293b', color: '#fff', confirmButtonColor: '#fbbf24'
        }).then(() => {
            renderMembers();
            checkMonthlyStatus();
            if(state.mode === 'spin') drawWheel();
        });
    }

    function renderMembers() {
        let html = "";
        state.members.forEach(m => {
            const pay = state.payments[m] || 0;
            const wonMonth = state.winners[m];
            
            html += `
                <div class="member-item">
                    <div>
                        <div style="font-weight:800; font-size:15px">${m}</div>
                        <div style="font-size:11px; opacity:0.5; margin-top:4px">Kas: Rp ${pay.toLocaleString('id-ID')}</div>
                    </div>
                    <div class="status-badge ${wonMonth ? 'sudah-dapat' : (pay >= 500000 ? 'lunas' : 'belum')}">
                        ${wonMonth ? 'DAPAT ('+wonMonth+')' : (pay >= 500000 ? 'LUNAS' : 'BELUM BAYAR')}
                    </div>
                </div>`;
        });
        document.getElementById('memberList').innerHTML = html;
        document.getElementById('memberCount').innerText = state.members.length;
    }

    async function openAdmin() {
        const { value: pin } = await Swal.fire({ title: 'PIN ADMIN', input: 'password', background: '#1e293b', color: '#fff' });
        if(pin !== ADMIN_PIN) return;

        let inputs = `<div style="text-align:left; max-height:400px; overflow-y:auto; padding-right:10px">`;
        state.members.forEach(m => {
            inputs += `<div style="margin-bottom:15px">
                <div style="display:flex; justify-content:space-between">
                    <label style="font-size:12px; color:var(--primary); font-weight:800">${m.toUpperCase()}</label>
                    <span onclick="removeMember('${m}')" style="color:#ef4444; font-size:10px; cursor:pointer">HAPUS</span>
                </div>
                <input type="number" id="pay-${m}" value="${state.payments[m] || 0}" style="width:100%; padding:12px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:#fff; margin-top:5px">
            </div>`;
        });
        inputs += `<hr style="border:0; border-top:1px solid #334155; margin:20px 0">
                   <input type="text" id="newName" placeholder="TAMBAH NAMA BARU..." style="width:100%; padding:12px; border-radius:10px; border:2px dashed #fbbf24; background:transparent; color:#fff"></div>`;

        const { value: result } = await Swal.fire({
            title: 'KAS & ANGGOTA',
            html: inputs,
            focusConfirm: false,
            background: '#1e293b', color: '#fff',
            showCancelButton: true,
            preConfirm: () => {
                let p = {};
                state.members.forEach(m => p[m] = parseInt(document.getElementById(`pay-${m}`).value) || 0);
                return { payments: p, newName: document.getElementById('newName').value.trim() };
            }
        });

        if(result) {
            state.payments = result.payments;
            if(result.newName) state.members.push(result.newName);
            save();
            renderMembers();
            drawWheel();
            checkMonthlyStatus();
        }
    }

    function removeMember(name) {
        if(confirm(`Hapus ${name} dari daftar?`)) {
            state.members = state.members.filter(m => m !== name);
            delete state.payments[name];
            delete state.winners[name];
            save();
            Swal.close();
            renderMembers();
            drawWheel();
        }
    }

    async function secureReset() {
        const { value: pin } = await Swal.fire({ 
            title: 'RESET TOTAL?', 
            text: 'Semua data kas dan pemenang akan dihapus permanen!',
            input: 'password', 
            background: '#1e293b', color: '#fff',
            confirmButtonColor: '#ef4444'
        });
        if(pin === ADMIN_PIN) {
            localStorage.clear();
            location.reload();
        }
    }

    function save() {
        localStorage.setItem('arisan_v5_names', JSON.stringify(state.members));
        localStorage.setItem('arisan_v5_winners', JSON.stringify(state.winners));
        localStorage.setItem('arisan_v5_pay', JSON.stringify(state.payments));
    }

    init();
</script>
</body>
</html>
