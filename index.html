<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISAN BULANAN Rp500.000</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #facc15; --text: #f8fafc; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid var(--accent); z-index: 10; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #334155; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-vote { background: var(--success); color: white; }
        .btn-admin { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        select, input { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box; }
        .progress-bar { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { background: var(--accent); height: 100%; transition: 0.5s; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div id="loader" class="overlay">⏳ Memproses ke Database...</div>

<div class="container">
    <h1 style="text-align:center; color:var(--accent); margin-bottom:0;">ARISAN IDAM ONLINE</h1>
    <p style="text-align:center; margin-top:5px; color:#94a3b8;">Bulan ke-<span id="monthTxt">1</span></p>

    <div class="wheel-box">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div class="card">
        <label>Pilih Nama Anda:</label>
        <select id="userSelect" onchange="updateStatusUI()"></select>
        <div id="userStatus" style="margin-top:10px; font-size:0.8rem;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" style="background:#475569; color:white;" onclick="spin(true)">Putar Iseng</button>
            <button id="voteBtn" class="btn btn-vote" onclick="spin(false)">VOTE RESMI</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 Statistik Vote Masuk</h3>
        <div id="statList">Memuat data...</div>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="card" style="border-color: var(--accent);">
            <h3 style="color:var(--accent); margin-top:0;">🛡️ DASHBOARD ADMIN</h3>
            
            <label>Input Nama Anggota Baru:</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="newMemberName" placeholder="Nama Baru...">
                <button onclick="addMember()" style="padding:10px; background:var(--accent); border:none; border-radius:8px;">Tambah</button>
            </div>

            <label style="display:block; margin-top:15px;">Kelola Pembayaran:</label>
            <div id="adminPayList"></div>

            <button class="btn btn-admin" style="margin-top:20px; background:var(--accent); color:black;" onclick="determineWinner()">TENTUKAN PEMENANG & LANJUT BULAN</button>
        </div>
    </div>

    <div class="card">
        <h3>🏆 Riwayat Pemenang</h3>
        <table id="winTable">
            <thead><tr><th>Bulan</th><th>Nama</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <button class="btn btn-admin" onclick="checkAdmin()">Mode Admin (PIN)</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznGdhfxYvlbm3W1JiqFPt1siT008NgcLAzRJp7I5wARzagHe1VeAU9wvEdBwyDSRGs/exec"; 
let db = { members: [], votes: [], month: 1 };
let angle = 0, isSpinning = false;
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

async function loadData() {
    const res = await fetch(SCRIPT_URL);
    db = await res.json();
    renderUI();
}

function renderUI() {
    document.getElementById("monthTxt").innerText = db.month;
    
    // Dropdown & Admin Pay List
    const select = document.getElementById("userSelect");
    const adminPayList = document.getElementById("adminPayList");
    
    select.innerHTML = db.members.map(m => `<option value="${m[0]}">${m[0]} ${m[1]=='Lunas'?'✅':'❌'}</option>`).join("");
    
    adminPayList.innerHTML = db.members.map(m => `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; background:#0f172a; padding:8px; border-radius:5px;">
            <span>${m[0]}</span>
            <button onclick="togglePay('${m[0]}', '${m[1]}')" style="font-size:0.7rem; background:${m[1]=='Lunas'?'#22c55e':'#ef4444'}; color:white; border:none; padding:5px 10px; border-radius:4px;">
                ${m[1]=='Lunas'?'Lunas':'Belum'}
            </button>
        </div>
    `).join("");

    // Statistik
    const statBox = document.getElementById("statList");
    const total = db.votes.length || 1;
    statBox.innerHTML = db.members.map(m => {
        const vCount = db.votes.filter(v => v[1] === m[0]).length;
        return `<div><div style="display:flex; justify-content:space-between; font-size:0.8rem;"><span>${m[0]}</span><span>${vCount} Vote</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${(vCount/total)*100}%"></div></div></div>`;
    }).join("");

    // Riwayat
    document.querySelector("#winTable tbody").innerHTML = db.members.filter(m => m[2] !== "").map(m => 
        `<tr><td>Bulan ${m[2]}</td><td><b>${m[0]}</b></td></tr>`).join("");

    updateStatusUI();
    drawWheel();
}

function drawWheel() {
    const names = db.members.map(m => m[0]);
    if(names.length == 0) return;
    const arc = (Math.PI * 2) / names.length;
    const colors = ["#ef4444", "#f59e0b", "#84cc16", "#06b6d4", "#3b82f6", "#a855f7", "#ec4899", "#f97316", "#10b981"];
    
    ctx.clearRect(0,0,500,500);
    names.forEach((m, i) => {
        ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(250, 250);
        ctx.arc(250, 250, 250, angle + i * arc, angle + (i+1) * arc); ctx.fill();
        ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + i * arc + arc/2);
        ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "right";
        ctx.fillText(m, 230, 8); ctx.restore();
    });
}

function updateStatusUI() {
    const user = document.getElementById("userSelect").value;
    const info = db.members.find(m => m[0] === user);
    const btn = document.getElementById("voteBtn");
    const status = document.getElementById("userStatus");
    
    if(info && info[1] === "Lunas") {
        status.innerHTML = "🟢 Status: <b>LUNAS</b> (Hak Vote Aktif)";
        btn.disabled = false; btn.style.opacity = "1";
    } else {
        status.innerHTML = "🔴 Status: <b>BELUM BAYAR</b> (Vote Terkunci)";
        btn.disabled = true; btn.style.opacity = "0.4";
    }
}

function spin(isDemo) {
    if (isSpinning) return;
    isSpinning = true;
    let speed = Math.random() * 0.2 + 0.45;
    function anim() {
        speed *= 0.985; angle += speed; drawWheel();
        if(speed > 0.002) requestAnimationFrame(anim);
        else {
            isSpinning = false;
            const names = db.members.map(m => m[0]);
            const res = names[Math.floor((names.length - (angle % (Math.PI*2)) / ((Math.PI*2)/names.length)) % names.length)];
            if(!isDemo) handleVote(res);
            else alert("Hasil Iseng: " + res);
        }
    }
    anim();
}

async function handleVote(res) {
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'vote', user: document.getElementById("userSelect").value, result: res }) });
    document.getElementById("loader").style.display = "none";
    alert("VOTE BERHASIL!"); loadData();
}

// ADMIN FUNCTIONS
function checkAdmin() {
    if(prompt("PIN ADMIN:") === "080522") document.getElementById("adminPanel").style.display = "block";
}

async function addMember() {
    const name = document.getElementById("newMemberName").value;
    if(!name) return;
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add_member', name: name }) });
    document.getElementById("newMemberName").value = "";
    loadData(); document.getElementById("loader").style.display = "none";
}

async function togglePay(name, current) {
    const next = current === "Lunas" ? "Belum" : "Lunas";
    document.getElementById("loader").style.display = "flex";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'update_pay', name: name, status: next }) });
    loadData(); document.getElementById("loader").style.display = "none";
}

async function determineWinner() {
    let winName = "";
    if(db.month == 1) winName = "Idam";
    else if(db.month == 10) winName = "Agus";
    else {
        let counts = {};
        db.votes.forEach(v => counts[v[1]] = (counts[v[1]] || 0) + 1);
        let sorted = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
        winName = sorted.find(n => !db.members.find(m => m[0] === n && m[2] !== ""));
    }
    
    if(!winName || !confirm(`Pemenang Bulan ${db.month} adalah ${winName}?`)) return;

    document.getElementById("loader").style.display = "flex";
    confetti({ particleCount: 200, spread: 80 });
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'set_winner', name: winName, month: db.month }) });
    loadData(); document.getElementById("loader").style.display = "none";
}

loadData();
setInterval(loadData, 20000);
</script>
</body>
</html>
