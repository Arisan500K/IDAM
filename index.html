<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISAN PRO SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --primary:#facc15;
  --accent:#38bdf8;
  --success:#22c55e;
  --danger:#ef4444;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:white;
}

.container{
  max-width:550px;
  margin:auto;
  padding:15px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
}

h1{text-align:center;color:var(--primary);}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.main{background:var(--primary);color:black}
.gray{background:#334155;color:white}
.danger{background:var(--danger);color:white}

#wheelBox{
  position:relative;
  width:320px;
  height:320px;
  margin:20px auto;
}

#pointer{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:30px solid var(--primary);
  z-index:10;
}

canvas{
  width:100%;
  height:100%;
  border-radius:50%;
  border:8px solid #334155;
}

select,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#020617;
  color:white;
  border:1px solid #334155;
  margin-top:10px;
}

.log{
  font-size:0.85rem;
  border-bottom:1px solid #334155;
  padding:6px;
}

.badge{
  background:var(--primary);
  color:black;
  padding:5px 15px;
  border-radius:20px;
  display:inline-block;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>ARISAN PRO</h1>
<center><div class="badge">BULAN <span id="month"></span></div></center>

<div id="wheelBox">
<div id="pointer"></div>
<canvas id="wheel" width="600" height="600"></canvas>
</div>

<div class="card">

<button class="main" onclick="login()">LOGIN PESERTA</button>

<select id="user"></select>

<div id="status"></div>

<button id="spinBtn" class="main" onclick="spin()">SPIN & VOTE</button>
<button class="gray" onclick="spinIseng()">SPIN ISENG</button>

</div>

<div class="card">
<h3>📑 Aktivitas Spin</h3>
<div id="log"></div>
</div>

<div class="card">
<h3>💰 Status Anggota</h3>
<div id="members"></div>
</div>

<div id="admin" style="display:none;" class="card">
<h3>🛡️ ADMIN PANEL</h3>

<select id="winner"></select>
<button class="main" onclick="setWinner()">SET PEMENANG</button>

<input type="number" id="monthSet" placeholder="Bulan">
<button class="main" onclick="setMonth()">SET BULAN</button>

<button class="danger" onclick="resetAll()">RESET SYSTEM</button>

</div>

<button onclick="adminLogin()" style="opacity:0.3;width:100%;">🔓 Admin</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx_rv1S8yjn7tQIY9FbHP3uGmwV7qwagPQ7ZsTp-wzmiCsvoVlh6bHY5ud3WgzcsG_V/exec";

let db = {};
let angle = 0;
let spinning = false;

// ===== API =====
async function api(data){
  const res = await fetch(API,{
    method:'POST',
    body:JSON.stringify(data),
    headers:{ "Content-Type":"text/plain;charset=utf-8" }
  });
  return await res.json();
}

// ===== LOAD =====
async function load(){
  db = await api({action:"get"});

  month.innerText = db.month;

  user.innerHTML = db.members.map(m=>`<option>${m.name}</option>`).join("");
  winner.innerHTML = user.innerHTML;

  log.innerHTML = db.votes.map(v=>`<div class="log">${v.user} → ${v.result}</div>`).join("");

  members.innerHTML = db.members.map(m=>`
    <div class="log">
      <b>${m.name}</b> - 
      <span style="color:${m.status=="Lunas"?"#22c55e":"#ef4444"}">
      ${m.status}
      </span>
    </div>
  `).join("");

  drawWheel();
  updateStatus();
}

// ===== STATUS =====
function updateStatus(){
  const m = db.members.find(x=>x.name===user.value);
  const v = db.votes.find(x=>x.user===user.value);

  if(!m) return;

  if(m.status !== "Lunas"){
    status.innerHTML = "❌ Belum bayar";
    spinBtn.disabled = true;
  }
  else if(v){
    status.innerHTML = "✅ Sudah spin: "+v.result;
    spinBtn.disabled = true;
  }
  else{
    status.innerHTML = "🟢 Siap spin";
    spinBtn.disabled = false;
  }
}

user.onchange = updateStatus;

// ===== WHEEL =====
function drawWheel(){
  const ctx = wheel.getContext("2d");
  const total = db.members.length;
  const arc = Math.PI*2/total;

  ctx.clearRect(0,0,600,600);

  db.members.forEach((m,i)=>{
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i*40},70%,50%)`;
    ctx.moveTo(300,300);
    ctx.arc(300,300,300,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(300,300);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(m.name,250,10);
    ctx.restore();
  });
}

// ===== LOGIN =====
async function login(){

  const options = db.members.map(m=>`<option>${m.name}</option>`).join("");

  const {value:form} = await Swal.fire({
    title:"Login",
    html:`
      <select id="n" class="swal2-input">${options}</select>
      <input id="p" type="password" class="swal2-input" placeholder="PIN">
    `,
    preConfirm:()=>({
      n:document.getElementById("n").value,
      p:document.getElementById("p").value
    })
  });

  if(!form) return;

  const r = await api({action:"login",...form});

  if(r.status==="ok"){
    user.value = form.n;
    updateStatus();
    Swal.fire("Berhasil","","success");
  }else{
    Swal.fire("Gagal PIN","","error");
  }
}

// ===== SPIN =====
async function spin(){

  if(spinning) return;
  spinning = true;

  const r = await api({
    action:"vote",
    user:user.value
  });

  if(r.status==="not_paid"){
    alert("Belum bayar");
    spinning=false;
    return;
  }

  const name = r.result;
  const index = db.members.findIndex(m=>m.name===name);
  const arc = 360 / db.members.length;
const sliceCenter = index * arc + arc / 2;
const target = 360 * 5 + (270 - sliceCenter);

  animate(target,name);
}

// ===== SPIN ISENG =====
function spinIseng(){
  const rand = db.members[Math.floor(Math.random()*db.members.length)].name;
  const index = db.members.findIndex(m=>m.name===rand);
  const arc = 360 / db.members.length;
const sliceCenter = index * arc + arc / 2;
const target = 360 * 5 + (270 - sliceCenter);
  animate(target,rand);
}

// ===== ANIMATION =====
function animate(target,name){

  const start = performance.now();
  const initial = angle;
  const duration = 10000;

  function ease(t){ return 1 - Math.pow(1-t,3); }

  function frame(now){
    const p = (now-start)/duration;

    if(p<1){
      angle = initial + (target-initial)*ease(p);
      wheel.style.transform = `rotate(${angle}deg)`;
      requestAnimationFrame(frame);
    }else{
      angle = target;
      wheel.style.transform = `rotate(${angle}deg)`;

      confetti();
      Swal.fire("🎉 Hasil",name,"success");

      spinning=false;
      load();
    }
  }

  requestAnimationFrame(frame);
}

// ===== ADMIN =====
function adminLogin(){
  const pin = prompt("PIN ADMIN");
  if(pin==="280498"){
    admin.style.display="block";
  }
}

async function setWinner(){
  await api({action:"set_winner_target",name:winner.value});
  load();
}

async function setMonth(){
  await api({action:"set_month",month:parseInt(monthSet.value)});
  load();
}

async function resetAll(){
  await api({action:"reset_all"});
  load();
}

load();

</script>

</body>
</html>
