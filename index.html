<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ARISAN BULANAN 500K</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#facc15;
}

.subtitle{
color:#94a3b8;
font-size:14px;
margin-bottom:10px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:15px;
margin:15px auto;
max-width:420px;
}

canvas{
width:100%;
border-radius:50%;
background:#111827;
transition:transform 7s cubic-bezier(.17,.67,.32,.99);
}

.wheelBox{
position:relative;
width:320px;
margin:auto;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:24px solid red;
}

.spinBtn{
margin-top:15px;
padding:12px 35px;
font-size:16px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

.member{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #334155;
}

.winner{
color:#64748b;
text-decoration:line-through;
}

.tag{
background:#facc15;
color:black;
font-size:11px;
padding:2px 6px;
border-radius:4px;
}

.bar{
background:#38bdf8;
height:10px;
margin-top:3px;
border-radius:4px;
}

.small{
font-size:12px;
color:#94a3b8;
}

.resetBtn{
margin-top:10px;
font-size:12px;
background:none;
border:none;
color:#94a3b8;
cursor:pointer;
}

.rules{
text-align:left;
font-size:13px;
line-height:1.6;
}

/* GELAS */

.glass{
width:120px;
height:150px;
margin:auto;
background:#334155;
border-radius:0 0 50px 50px;
position:relative;
}

.hole{
width:20px;
height:20px;
background:black;
border-radius:50%;
position:absolute;
bottom:5px;
left:50%;
transform:translateX(-50%);
}

.glassName{
margin-top:10px;
font-size:20px;
color:#facc15;
height:30px;
}

.shake{
animation:shake 0.4s infinite;
}

@keyframes shake{

0%{transform:rotate(-6deg)}
50%{transform:rotate(6deg)}
100%{transform:rotate(-6deg)}

}

</style>
</head>

<body>

<h1>ARISAN BULANAN 500K</h1>
<div class="subtitle">Ketua: Idam</div>

<div id="bulanText"></div>

<!-- WHEEL -->

<div class="card">

<h3>Mode Wheel</h3>

<div class="wheelBox">
<div class="pointer"></div>
<canvas id="wheel" width="500" height="500"></canvas>
</div>

<button class="spinBtn" onclick="startWheel()">SPIN WHEEL</button>

<div id="progressSpin" class="small"></div>

</div>

<!-- GELAS -->

<div class="card">

<h3>Mode Gelas Kocok</h3>

<div class="glass" id="glass">
<div class="hole"></div>
</div>

<div id="glassResult" class="glassName"></div>

<button class="spinBtn" onclick="startGlass()">SPIN GELAS</button>

</div>

<!-- PESERTA -->

<div class="card">

<h3>Daftar Peserta</h3>
<div id="memberList"></div>

</div>

<!-- STATISTIK -->

<div class="card">

<h3>Statistik Voting</h3>
<div id="statList"></div>

</div>

<button class="resetBtn" onclick="resetSystem()">Reset Sistem</button>

<script>

const RESET_PIN="080522"

const NAMES=[
"Idam","Aki","Daeli","Ros","Dewi",
"Septi","Medina","Agus","Elis","Tri"
]

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

let rotation=0
let spinning=false

let winnerData=JSON.parse(localStorage.getItem("winnerData"))||{}
let voteData=JSON.parse(localStorage.getItem("voteData"))||{}
let spinResults=JSON.parse(localStorage.getItem("spinResults"))||{}

function getMonth(){

const m=[
"Januari","Februari","Maret","April",
"Mei","Juni","Juli","Agustus",
"September","Oktober","November","Desember"
]

return m[new Date().getMonth()]

}

document.getElementById("bulanText").innerText="Bulan "+getMonth()

if(!winnerData["Idam"]){
winnerData["Idam"]="Maret"
localStorage.setItem("winnerData",JSON.stringify(winnerData))
}

function getActiveNames(){
return NAMES.filter(n=>!winnerData[n])
}

function drawWheel(){

const names=getActiveNames()

if(names.length===0){
ctx.clearRect(0,0,500,500)
ctx.fillStyle="white"
ctx.font="28px Arial"
ctx.textAlign="center"
ctx.fillText("SEMUA SUDAH MENANG",250,250)
return
}

const arc=(2*Math.PI)/names.length

ctx.clearRect(0,0,500,500)

names.forEach((name,i)=>{

let angle=i*arc

ctx.beginPath()
ctx.fillStyle=`hsl(${i*40},70%,50%)`
ctx.moveTo(250,250)
ctx.arc(250,250,250,angle-Math.PI/2,(angle+arc)-Math.PI/2)
ctx.fill()

ctx.save()
ctx.translate(250,250)
ctx.rotate(angle+arc/2-Math.PI/2)

ctx.fillStyle="white"
ctx.font="18px Arial"
ctx.textAlign="right"

ctx.fillText(name,210,5)

ctx.restore()

})

}

async function chooseName(){

const {value:name}=await Swal.fire({
title:"Pilih Nama Anda",
input:"select",
inputOptions:NAMES
})

return name

}

function processVote(player,winner){

spinResults[player]=winner
voteData[winner]=(voteData[winner]||0)+1

localStorage.setItem("spinResults",JSON.stringify(spinResults))
localStorage.setItem("voteData",JSON.stringify(voteData))

Swal.fire("Hasil SPIN/PUTAR Anda",winner)

drawWheel()
renderStats()
renderMembers()
renderProgress()

checkWinner()

}

async function startWheel(){

if(spinning)return

let name=await chooseName()

if(spinResults[name]){
Swal.fire("Hasil Anda",spinResults[name])
return
}

spinning=true

const names=getActiveNames()

let random=Math.floor(Math.random()*360)

rotation+=360*10+random

canvas.style.transform=`rotate(${rotation}deg)`

setTimeout(()=>{

const slice=360/names.length
const stop=rotation%360
const index=Math.floor((360-stop)/slice)%names.length
const winner=names[index]

processVote(name,winner)

spinning=false

},7000)

}

async function startGlass(){

if(spinning)return

let name=await chooseName()

if(spinResults[name]){
Swal.fire("Hasil Anda",spinResults[name])
return
}

spinning=true

const glass=document.getElementById("glass")
const result=document.getElementById("glassResult")

const names=getActiveNames()

glass.classList.add("shake")
result.innerText=""

setTimeout(()=>{

glass.classList.remove("shake")

let index=Math.floor(Math.random()*names.length)
let winner=names[index]

result.innerText=winner

processVote(name,winner)

spinning=false

},3000)

}

function checkWinner(){

const total=NAMES.length-1
const done=Object.keys(spinResults).length

if(done===total){

let max=0
let winner=""

for(let n in voteData){
if(voteData[n]>max){
max=voteData[n]
winner=n
}
}

winnerData[winner]=getMonth()

localStorage.setItem("winnerData",JSON.stringify(winnerData))

Swal.fire({
title:"PEMENANG BULAN "+getMonth(),
html:`<h1 style="color:#facc15">${winner}</h1>`
})

confetti({
particleCount:200,
spread:100
})

}

}

function renderMembers(){

let html=""

NAMES.forEach(n=>{

if(winnerData[n]){

html+=`
<div class="member winner">
<span>✔ ${n}</span>
<span class="tag">${winnerData[n]}</span>
</div>
`

}else{

html+=`
<div class="member">
<span>⭕ ${n}</span>
</div>
`

}

})

document.getElementById("memberList").innerHTML=html

}

function renderStats(){

let html=""
let max=0

for(let n in voteData){
if(voteData[n]>max)max=voteData[n]
}

for(let n in voteData){

let v=voteData[n]
let w=(v/max)*100

html+=`
<div>
${n} (${v})
<div class="bar" style="width:${w}%"></div>
</div>
`

}

document.getElementById("statList").innerHTML=html

}

function renderProgress(){

const total=NAMES.length-1
const done=Object.keys(spinResults).length

document.getElementById("progressSpin").innerText=
done+" / "+total+" peserta sudah spin"

}

async function resetSystem(){

const {value:pin}=await Swal.fire({
title:"Masukkan Kode Reset",
input:"password"
})

if(pin!==RESET_PIN){

Swal.fire("Kode Salah")
return

}

localStorage.clear()

Swal.fire("Sistem Direset")

location.reload()

}

drawWheel()
renderMembers()
renderStats()
renderProgress()

</script>

</body>
</html>
