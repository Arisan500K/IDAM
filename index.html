```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARISAN DIGITAL v3</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
font-family:Segoe UI;
background:#121212;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
}

h1{
color:#ffcc00;
}

.modeBtn{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.admin{background:#ffcc00;color:black;}
.peserta{background:#3498db;color:white;}

.spinBtn{
margin-top:15px;
padding:15px;
width:200px;
font-size:16px;
border:none;
border-radius:12px;
background:#27ae60;
color:white;
cursor:pointer;
}

canvas{
margin-top:20px;
border-radius:50%;
background:#222;
transition:transform 6s cubic-bezier(.17,.67,.32,.99);
}

.list{
margin-top:20px;
width:300px;
}

.member{
padding:8px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
}

.stat{
margin-top:20px;
width:300px;
}

.bar{
background:#3498db;
height:10px;
margin-top:3px;
}

</style>
</head>

<body>

<h1>ARISAN DIGITAL</h1>

<div>
<button class="modeBtn admin" onclick="setMode('admin')">MODE ADMIN</button>
<button class="modeBtn peserta" onclick="setMode('peserta')">MODE PESERTA</button>
</div>

<div id="modeText">Mode: ADMIN</div>

<canvas id="wheel" width="400" height="400"></canvas>

<button class="spinBtn" onclick="startSpin()">SPIN</button>

<div class="list">
<h3>Peserta</h3>
<div id="memberList"></div>
</div>

<div class="stat">
<h3>Statistik Voting</h3>
<div id="statList"></div>
</div>

<button onclick="resetSystem()">Reset System</button>

<script>

const ADMIN_PIN="123456"

const NAMES=[
"Idam","Aki","Daeli","Ros","Dewi",
"Septi","Medina","Agus","Elis","Tri"
]

let mode="admin"

let voteData=JSON.parse(localStorage.getItem("voteData"))||{}
let spinLock=JSON.parse(localStorage.getItem("spinLock"))||{}
let winnerHistory=JSON.parse(localStorage.getItem("winnerHistory"))||{}

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

let rotation=0
let spinning=false

function setMode(m){

mode=m

document.getElementById("modeText").innerText="Mode: "+m.toUpperCase()

renderStats()

}

function drawWheel(){

let arc=(2*Math.PI)/NAMES.length

ctx.clearRect(0,0,400,400)

NAMES.forEach((name,i)=>{

let angle=i*arc

ctx.beginPath()
ctx.fillStyle=`hsl(${i*36},70%,50%)`

ctx.moveTo(200,200)

ctx.arc(200,200,200,angle-Math.PI/2,(angle+arc)-Math.PI/2)

ctx.fill()

ctx.save()

ctx.translate(200,200)

ctx.rotate(angle+arc/2-Math.PI/2)

ctx.fillStyle="white"
ctx.font="16px Arial"
ctx.textAlign="right"

ctx.fillText(name,170,5)

ctx.restore()

})

}

function startSpin(){

if(spinning)return

if(mode==="admin")spinAdmin()
if(mode==="peserta")spinPeserta()

}

async function spinAdmin(){

const {value:pin}=await Swal.fire({
title:"PIN ADMIN",
input:"password"
})

if(pin!==ADMIN_PIN){
Swal.fire("PIN SALAH")
return
}

executeSpin(true)

}

async function spinPeserta(){

const {value:name}=await Swal.fire({
title:"Masukkan Nama Anda",
input:"select",
inputOptions:NAMES
})

if(spinLock[name]){
Swal.fire("Anda sudah spin bulan ini")
return
}

executeSpin(false,name)

}

function executeSpin(admin,name){

spinning=true

let random=Math.floor(Math.random()*360)

rotation+=360*10+random

canvas.style.transform=`rotate(${rotation}deg)`

setTimeout(()=>{

let slice=360/NAMES.length

let stop=rotation%360

let index=Math.floor((360-stop)/slice)%NAMES.length

let winner=NAMES[index]

if(admin){

winnerHistory[getMonth()]=winner

localStorage.setItem("winnerHistory",JSON.stringify(winnerHistory))

Swal.fire("PEMENANG BULAN INI",winner)

}

else{

spinLock[name]=true

voteData[winner]=(voteData[winner]||0)+1

localStorage.setItem("spinLock",JSON.stringify(spinLock))

localStorage.setItem("voteData",JSON.stringify(voteData))

Swal.fire("HASIL SPIN ANDA",winner)

}

spinning=false

renderStats()

},6000)

}

function renderMembers(){

let html=""

NAMES.forEach(n=>{

html+=`<div class='member'>${n}</div>`

})

document.getElementById("memberList").innerHTML=html

}

function renderStats(){

let html=""

let max=0

for(let n in voteData){

if(voteData[n]>max)max=voteData[n]

}

for(let n in voteData){

let v=voteData[n]

let width=(v/max)*100

html+=`
<div>

${n} (${v})

<div class="bar" style="width:${width}%"></div>

</div>
`

}

document.getElementById("statList").innerHTML=html

}

function getMonth(){

const m=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"]

return m[new Date().getMonth()]

}

function resetSystem(){

localStorage.clear()

location.reload()

}

drawWheel()

renderMembers()

renderStats()

</script>

</body>
</html>
```
