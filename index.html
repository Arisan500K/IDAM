<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARISAN PRO SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#facc15;
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --success:#22c55e;
  --danger:#ef4444;
}

body {
  margin:0;
  font-family:'Poppins';
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:500px;
  padding:15px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

h1 {
  text-align:center;
  color:var(--primary);
}

.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn-main { background:var(--primary); color:black; }
.btn-danger { background:var(--danger); color:white; }

select,input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  margin-top:10px;
}

#wheelBox {
  position:relative;
  width:300px;
  height:300px;
  margin:20px auto;
}

#pointer {
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:25px solid var(--primary);
}

canvas {
  width:100%;
  height:100%;
  border-radius:50%;
  border:6px solid #334155;
}

#loader {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.spin {
  width:40px;
  height:40px;
  border:4px solid var(--primary);
  border-top:transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg);} }

.log {
  font-size:0.8rem;
  border-bottom:1px solid #334155;
  padding:5px;
}
</style>
</head>

<body>

<div id="loader"><div class="spin"></div></div>

<div class="container">

<h1>ARISAN PRO</h1>
<div style="text-align:center;">Bulan ke-<b id="monthTxt">1</b></div>

<div id="wheelBox">
<div id="pointer"></div>
<canvas id="wheel" width="600" height="600"></canvas>
</div>

<div class="card">

<button class="btn btn-main" onclick="login()">LOGIN</button>

<select id="user"></select>

<div id="status"></div>

<button class="btn btn-main" onclick="spin()">SPIN</button>

</div>

<div class="card">
<h3>Log Spin</h3>
<div id="logs"></div>
</div>

<div id="admin" style="display:none;" class="card">

<h3>ADMIN</h3>

<select id="setWinner"></select>
<button class="btn btn-main" onclick="setWinner()">SET PEMENANG</button>

<input type="number" id="setMonth" placeholder="Bulan">
<button class="btn btn-main" onclick="setMonth()">SET BULAN</button>

<button class="btn btn-danger" onclick="resetAll()">RESET</button>

</div>

<button onclick="adminLogin()" style="opacity:0.3;">Admin</button>

</div>

<script>

// ===== CONFIG =====
const API = "ISI_URL_APPS_SCRIPT_KAMU";

// ===== STATE =====
let db = {};
let angle = 0;
let spinning = false;

// ===== INIT =====
async function load(){
  showLoad(true);
  const res = await fetch(API);
  db = await res.json();
  render();
  showLoad(false);
}

// ===== RENDER =====
function render(){
  document.getElementById("monthTxt").innerText = db.month;

  document.getElementById("user").innerHTML =
    db.members.map(m=>`<option>${m.name}</option>`).join("");

  document.getElementById("setWinner").innerHTML =
    db.members.map(m=>`<option>${m.name}</option>`).join("");

  document.getElementById("logs").innerHTML =
    db.votes.map(v=>`<div class="log">${v.user} → ${v.result}</div>`).join("");

  drawWheel();
}

// ===== WHEEL =====
function drawWheel(){
  const ctx = wheel.getContext("2d");
  const total = db.members.length;
  const arc = Math.PI*2/total;

  ctx.clearRect(0,0,600,600);

  db.members.forEach((m,i)=>{
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i*40},70%,50%)`;
    ctx.moveTo(300,300);
    ctx.arc(300,300,300,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(300,300);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.fillText(m.name,250,10);
    ctx.restore();
  });
}

// ===== LOGIN =====
async function login(){
  const {value:form} = await Swal.fire({
    title:'Login',
    html:`<input id="n" class="swal2-input" placeholder="Nama">
          <input id="p" type="password" class="swal2-input" placeholder="PIN">`,
    preConfirm:()=>{
      return {
        n:document.getElementById("n").value,
        p:document.getElementById("p").value
      }
    }
  });

  const r = await fetch(API,{
    method:'POST',
    body:JSON.stringify({action:'login',...form})
  });

  const j = await r.json();

  if(j.status=="ok"){
    document.getElementById("user").value = form.n;
    Swal.fire("OK","","success");
  }else{
    Swal.fire("Gagal","","error");
  }
}

// ===== SPIN =====
async function spin(){

  if(spinning) return;

  spinning = true;

  let speed = 0.5;

  function anim(){
    speed *=0.97;
    angle += speed;
    drawWheel();

    if(speed>0.01) requestAnimationFrame(anim);
    else finish();
  }

  anim();

  async function finish(){
    spinning=false;

    showLoad(true);

    const user = document.getElementById("user").value;

    const r = await fetch(API,{
      method:'POST',
      body:JSON.stringify({action:'vote',user})
    });

    const j = await r.json();

    showLoad(false);

    confetti();

    Swal.fire("Hasil", j.result, "success");

    load();
  }
}

// ===== ADMIN =====
function adminLogin(){
  Swal.fire({input:'password'}).then(r=>{
    if(r.value=="280498"){
      document.getElementById("admin").style.display="block";
    }
  });
}

async function setWinner(){
  const name = setWinner.value;

  await fetch(API,{
    method:'POST',
    body:JSON.stringify({
      action:'set_winner_target',
      name
    })
  });

  load();
}

async function setMonth(){
  const m = setMonth.value;

  await fetch(API,{
    method:'POST',
    body:JSON.stringify({
      action:'set_month',
      month:parseInt(m)
    })
  });

  load();
}

async function resetAll(){
  await fetch(API,{
    method:'POST',
    body:JSON.stringify({action:'reset_all'})
  });

  load();
}

// ===== UTIL =====
function showLoad(x){
  document.getElementById("loader").style.display = x?'flex':'none';
}

load();

</script>

</body>
</html>
